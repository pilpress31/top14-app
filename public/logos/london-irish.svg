<svg
  width="200"
  height="200"
  viewBox="0 0 200 200"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <clipPath id="london-irish-hex-clip">
      <polygon points="
        100,10
        175,50
        175,150
        100,190
        25,150
        25,50
      " />
    </clipPath>

    <!-- Zone intérieure pour éviter que les décors touchent les bordures -->
    <clipPath id="london-irish-safe-clip">
      <polygon points="
        100,36
        150,64
        150,136
        100,164
        50,136
        50,64
      " />
    </clipPath>

    <linearGradient id="london-irish-bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#007A3D" />
      <stop offset="100%" stop-color="#003B1F" />
    </linearGradient>

    <linearGradient id="london-irish-green-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00A651" />
      <stop offset="60%" stop-color="#007A3D" />
      <stop offset="100%" stop-color="#004D28" />
    </linearGradient>

    <linearGradient id="london-irish-text-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#BFEFD4" />
    </linearGradient>
  </defs>

  <!-- Fond principal -->
  <g clip-path="url(#london-irish-hex-clip)">
    <rect width="200" height="200" fill="url(#london-irish-bg-grad)" />
  </g>

  <!-- Décor intérieur London Irish -->
  <g clip-path="url(#london-irish-safe-clip)">
    <!-- Bande centrale blanche -->
    <rect
      x="50"
      y="82"
      width="100"
      height="36"
      fill="#FFFFFF"
      opacity="0.9"
    />

    <!-- Bande verte centrale pour garder le texte lisible -->
    <rect
      x="52"
      y="90"
      width="96"
      height="20"
      fill="#004D28"
      opacity="0.92"
    />

    <!-- Bandes orange / blanc / vert inspirées irlandaises -->
    <rect
      x="58"
      y="64"
      width="84"
      height="7"
      fill="#FFFFFF"
      opacity="0.85"
    />

    <rect
      x="58"
      y="129"
      width="84"
      height="7"
      fill="#FFFFFF"
      opacity="0.85"
    />

    <rect
      x="58"
      y="74"
      width="84"
      height="4"
      fill="#FF8200"
      opacity="0.85"
    />

    <rect
      x="58"
      y="122"
      width="84"
      height="4"
      fill="#FF8200"
      opacity="0.85"
    />

    <!-- Trèfle stylisé discret -->
    <path
      d="M100 57
         C94 47, 80 52, 83 66
         C70 63, 64 77, 75 85
         C83 91, 94 85, 100 76
         C106 85, 117 91, 125 85
         C136 77, 130 63, 117 66
         C120 52, 106 47, 100 57Z"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="5"
      opacity="0.28"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Tige du trèfle -->
    <path
      d="M100 76 C98 88, 96 96, 91 105"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="4"
      opacity="0.22"
      stroke-linecap="round"
    />

    <!-- Ballon de rugby abstrait -->
    <path
      d="M64 121
         C82 105, 118 105, 136 121
         C116 136, 84 136, 64 121Z"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="4"
      opacity="0.22"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Accent orange dynamique -->
    <path
      d="M58 136 L142 64"
      stroke="#FF8200"
      stroke-width="4"
      opacity="0.2"
      stroke-linecap="round"
    />

    <!-- Accent blanc dynamique -->
    <path
      d="M58 64 L142 136"
      stroke="#FFFFFF"
      stroke-width="4"
      opacity="0.14"
      stroke-linecap="round"
    />

    <!-- Ligne centrale discrète -->
    <path
      d="M62 100 L138 100"
      stroke="#BFEFD4"
      stroke-width="3"
      opacity="0.18"
      stroke-linecap="round"
    />
  </g>

  <!-- Bordure extérieure noire -->
  <polygon
    points="100,10 175,50 175,150 100,190 25,150 25,50"
    fill="none"
    stroke="#000000"
    stroke-width="8"
  />

  <!-- Bordure intérieure blanche -->
  <polygon
    points="100,22 163.5,54 163.5,146 100,178 36.5,146 36.5,54"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="4"
  />

  <!-- Fine bordure orange -->
  <polygon
    points="100,30 156,58 156,142 100,170 44,142 44,58"
    fill="none"
    stroke="#FF8200"
    stroke-width="2"
    opacity="0.95"
  />

  <!-- Texte LIR avec contour noir, sans débordement -->
  <text
    x="100"
    y="111"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="url(#london-irish-text-grad)"
    stroke="#000000"
    stroke-width="6"
    paint-order="stroke"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="42"
    textLength="84"
    lengthAdjust="spacingAndGlyphs"
  >
    LIR
  </text>

  <!-- Contour orange fin -->
  <text
    x="100"
    y="111"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="url(#london-irish-text-grad)"
    stroke="#FF8200"
    stroke-width="1.8"
    paint-order="stroke"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="42"
    textLength="84"
    lengthAdjust="spacingAndGlyphs"
  >
    LIR
  </text>
</svg>
<svg
  width="200"
  height="200"
  viewBox="0 0 200 200"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <clipPath id="benetton-hex-clip">
      <polygon points="
        100,10
        175,50
        175,150
        100,190
        25,150
        25,50
      " />
    </clipPath>

    <!-- Zone intérieure pour éviter que les décors touchent les bordures -->
    <clipPath id="benetton-safe-clip">
      <polygon points="
        100,36
        150,64
        150,136
        100,164
        50,136
        50,64
      " />
    </clipPath>

    <linearGradient id="benetton-bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#009A44" />
      <stop offset="100%" stop-color="#005B2E" />
    </linearGradient>

    <linearGradient id="benetton-text-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#BFEAD0" />
    </linearGradient>
  </defs>

  <!-- Fond principal -->
  <g clip-path="url(#benetton-hex-clip)">
    <rect width="200" height="200" fill="url(#benetton-bg-grad)" />
  </g>

  <!-- Décor intérieur Benetton, sans toucher les bordures -->
  <g clip-path="url(#benetton-safe-clip)">
    <!-- Bande centrale blanche -->
    <rect
      x="50"
      y="82"
      width="100"
      height="36"
      fill="#FFFFFF"
      opacity="0.9"
    />

    <!-- Bande vert foncé centrale pour garder le texte lisible -->
    <rect
      x="56"
      y="91"
      width="88"
      height="18"
      fill="#005B2E"
      opacity="0.92"
    />

    <!-- Bandes bleu foncé fines éloignées du texte -->
    <rect
      x="58"
      y="66"
      width="84"
      height="5"
      fill="#002B5C"
      opacity="0.85"
    />

    <rect
      x="58"
      y="129"
      width="84"
      height="5"
      fill="#002B5C"
      opacity="0.85"
    />

    <!-- Chevrons verts/blancs inspirés d’un style dynamique, sans reprendre le logo officiel -->
    <path
      d="M64 78 L100 58 L136 78"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="5"
      opacity="0.35"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <path
      d="M64 122 L100 142 L136 122"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="5"
      opacity="0.25"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Motif lion abstrait / crinière très stylisée, discret -->
    <path
      d="M72 100 C82 76, 118 76, 128 100 C116 92, 84 92, 72 100"
      fill="none"
      stroke="#BFEAD0"
      stroke-width="5"
      opacity="0.28"
      stroke-linecap="round"
    />

    <path
      d="M72 100 C84 124, 116 124, 128 100"
      fill="none"
      stroke="#002B5C"
      stroke-width="5"
      opacity="0.22"
      stroke-linecap="round"
    />

    <!-- Traits diagonaux discrets -->
    <path
      d="M56 136 L144 64"
      stroke="#FFFFFF"
      stroke-width="4"
      opacity="0.12"
      stroke-linecap="round"
    />

    <path
      d="M56 64 L144 136"
      stroke="#002B5C"
      stroke-width="4"
      opacity="0.18"
      stroke-linecap="round"
    />
  </g>

  <!-- Bordure extérieure noire -->
  <polygon
    points="100,10 175,50 175,150 100,190 25,150 25,50"
    fill="none"
    stroke="#000000"
    stroke-width="8"
  />

  <!-- Bordure intérieure blanche -->
  <polygon
    points="100,22 163.5,54 163.5,146 100,178 36.5,146 36.5,54"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="4"
  />

  <!-- Fine bordure vert clair -->
  <polygon
    points="100,30 156,58 156,142 100,170 44,142 44,58"
    fill="none"
    stroke="#BFEAD0"
    stroke-width="2"
  />

  <!-- Texte BEN avec contour noir -->
  <text
    x="50%"
    y="112"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="url(#benetton-text-grad)"
    stroke="#000000"
    stroke-width="7"
    paint-order="stroke"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="50"
    textLength="106"
    lengthAdjust="spacingAndGlyphs"
  >
    BEN
  </text>

  <!-- Texte BEN avec contour vert clair fin -->
  <text
    x="50%"
    y="112"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="url(#benetton-text-grad)"
    stroke="#BFEAD0"
    stroke-width="2"
    paint-order="stroke"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="50"
    textLength="106"
    lengthAdjust="spacingAndGlyphs"
  >
    BEN
  </text>
</svg>
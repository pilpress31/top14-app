<svg
  width="200"
  height="200"
  viewBox="0 0 200 200"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <clipPath id="ulster-hex-clip">
      <polygon points="
        100,10
        175,50
        175,150
        100,190
        25,150
        25,50
      " />
    </clipPath>

    <!-- Zone intérieure pour éviter que les décors touchent les bordures -->
    <clipPath id="ulster-safe-clip">
      <polygon points="
        100,36
        150,64
        150,136
        100,164
        50,136
        50,64
      " />
    </clipPath>

    <linearGradient id="ulster-bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D71920" />
      <stop offset="100%" stop-color="#7A0012" />
    </linearGradient>

    <linearGradient id="ulster-text-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#D9D9D9" />
    </linearGradient>
  </defs>

  <!-- Fond principal -->
  <g clip-path="url(#ulster-hex-clip)">
    <rect width="200" height="200" fill="url(#ulster-bg-grad)" />
  </g>

  <!-- Décor intérieur Ulster, sans toucher les bordures -->
  <g clip-path="url(#ulster-safe-clip)">
    <!-- Bande centrale blanche -->
    <rect
      x="50"
      y="82"
      width="100"
      height="36"
      fill="#FFFFFF"
      opacity="0.9"
    />

    <!-- Bande noire centrale pour garder le texte lisible -->
    <rect
      x="56"
      y="91"
      width="88"
      height="18"
      fill="#111111"
      opacity="0.92"
    />

    <!-- Bandes noires fines éloignées du texte -->
    <rect
      x="58"
      y="66"
      width="84"
      height="5"
      fill="#111111"
      opacity="0.85"
    />

    <rect
      x="58"
      y="129"
      width="84"
      height="5"
      fill="#111111"
      opacity="0.85"
    />

    <!-- Motif rouge/blanc stylisé, esprit héraldique sans reprendre le logo officiel -->
    <path
      d="M64 78 L100 58 L136 78"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="5"
      opacity="0.35"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <path
      d="M64 122 L100 142 L136 122"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="5"
      opacity="0.28"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Main stylisée très abstraite, discrète, sans reprendre l’emblème officiel -->
    <circle
      cx="100"
      cy="100"
      r="20"
      fill="#D71920"
      opacity="0.22"
    />

    <rect
      x="96"
      y="60"
      width="8"
      height="34"
      rx="4"
      fill="#FFFFFF"
      opacity="0.22"
    />

    <rect
      x="82"
      y="67"
      width="7"
      height="28"
      rx="3.5"
      fill="#FFFFFF"
      opacity="0.18"
      transform="rotate(-18 85.5 81)"
    />

    <rect
      x="111"
      y="67"
      width="7"
      height="28"
      rx="3.5"
      fill="#FFFFFF"
      opacity="0.18"
      transform="rotate(18 114.5 81)"
    />
  </g>

  <!-- Bordure extérieure noire -->
  <polygon
    points="100,10 175,50 175,150 100,190 25,150 25,50"
    fill="none"
    stroke="#000000"
    stroke-width="8"
  />

  <!-- Bordure intérieure blanche -->
  <polygon
    points="100,22 163.5,54 163.5,146 100,178 36.5,146 36.5,54"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="4"
  />

  <!-- Fine bordure noire -->
  <polygon
    points="100,30 156,58 156,142 100,170 44,142 44,58"
    fill="none"
    stroke="#111111"
    stroke-width="2"
  />

  <!-- Texte ULS avec contour noir -->
  <text
    x="50%"
    y="112"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="url(#ulster-text-grad)"
    stroke="#000000"
    stroke-width="7"
    paint-order="stroke"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="50"
    textLength="106"
    lengthAdjust="spacingAndGlyphs"
  >
    ULS
  </text>

  <!-- Texte ULS avec contour rouge fin -->
  <text
    x="50%"
    y="112"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="url(#ulster-text-grad)"
    stroke="#D71920"
    stroke-width="2"
    paint-order="stroke"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="50"
    textLength="106"
    lengthAdjust="spacingAndGlyphs"
  >
    ULS
  </text>
</svg>
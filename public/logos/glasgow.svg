<svg
  width="200"
  height="200"
  viewBox="0 0 200 200"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <clipPath id="glasgow-hex-clip">
      <polygon points="
        100,10
        175,50
        175,150
        100,190
        25,150
        25,50
      " />
    </clipPath>

    <!-- Zone intérieure pour éviter que les décors touchent les bordures -->
    <clipPath id="glasgow-safe-clip">
      <polygon points="
        100,36
        150,64
        150,136
        100,164
        50,136
        50,64
      " />
    </clipPath>

    <linearGradient id="glasgow-bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0B1F3A" />
      <stop offset="100%" stop-color="#000000" />
    </linearGradient>

    <linearGradient id="glasgow-text-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#66C7F4" />
    </linearGradient>
  </defs>

  <!-- Fond principal -->
  <g clip-path="url(#glasgow-hex-clip)">
    <rect width="200" height="200" fill="url(#glasgow-bg-grad)" />
  </g>

  <!-- Décor intérieur Glasgow Warriors, sans toucher les bordures -->
  <g clip-path="url(#glasgow-safe-clip)">
    <!-- Bande centrale bleu ciel -->
    <rect
      x="50"
      y="82"
      width="100"
      height="36"
      fill="#66C7F4"
      opacity="0.9"
    />

    <!-- Bande sombre au centre pour garder le texte lisible -->
    <rect
      x="58"
      y="91"
      width="84"
      height="18"
      fill="#071426"
      opacity="0.9"
    />

    <!-- Bandes blanches fines -->
    <rect
      x="58"
      y="68"
      width="84"
      height="5"
      fill="#FFFFFF"
      opacity="0.8"
    />

    <rect
      x="58"
      y="127"
      width="84"
      height="5"
      fill="#FFFFFF"
      opacity="0.8"
    />

    <!-- Chevrons stylisés, esprit Warriors, sans reprendre le logo officiel -->
    <path
      d="M62 78 L100 56 L138 78"
      fill="none"
      stroke="#66C7F4"
      stroke-width="5"
      opacity="0.55"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <path
      d="M62 122 L100 144 L138 122"
      fill="none"
      stroke="#66C7F4"
      stroke-width="5"
      opacity="0.45"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Traits diagonaux discrets -->
    <path
      d="M55 136 L145 64"
      stroke="#FFFFFF"
      stroke-width="4"
      opacity="0.16"
      stroke-linecap="round"
    />

    <path
      d="M55 64 L145 136"
      stroke="#66C7F4"
      stroke-width="4"
      opacity="0.18"
      stroke-linecap="round"
    />
  </g>

  <!-- Bordure extérieure noire -->
  <polygon
    points="100,10 175,50 175,150 100,190 25,150 25,50"
    fill="none"
    stroke="#000000"
    stroke-width="8"
  />

  <!-- Bordure intérieure blanche -->
  <polygon
    points="100,22 163.5,54 163.5,146 100,178 36.5,146 36.5,54"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="4"
  />

  <!-- Fine bordure bleu ciel -->
  <polygon
    points="100,30 156,58 156,142 100,170 44,142 44,58"
    fill="none"
    stroke="#66C7F4"
    stroke-width="2"
  />

  <!-- Texte GLA avec contour noir -->
  <text
    x="50%"
    y="112"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="url(#glasgow-text-grad)"
    stroke="#000000"
    stroke-width="7"
    paint-order="stroke"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="50"
    textLength="104"
    lengthAdjust="spacingAndGlyphs"
  >
    GLA
  </text>

  <!-- Texte GLA avec contour bleu ciel fin -->
  <text
    x="50%"
    y="112"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="url(#glasgow-text-grad)"
    stroke="#66C7F4"
    stroke-width="2"
    paint-order="stroke"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="50"
    textLength="104"
    lengthAdjust="spacingAndGlyphs"
  >
    GLA
  </text>
</svg>
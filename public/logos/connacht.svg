<svg
  width="200"
  height="200"
  viewBox="0 0 200 200"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <clipPath id="connacht-hex-clip">
      <polygon points="
        100,10
        175,50
        175,150
        100,190
        25,150
        25,50
      " />
    </clipPath>

    <!-- Zone intérieure pour éviter que les décors touchent les bordures -->
    <clipPath id="connacht-safe-clip">
      <polygon points="
        100,36
        150,64
        150,136
        100,164
        50,136
        50,64
      " />
    </clipPath>

    <linearGradient id="connacht-bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#009A44" />
      <stop offset="100%" stop-color="#004B2B" />
    </linearGradient>

    <linearGradient id="connacht-text-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#BFEAD0" />
    </linearGradient>
  </defs>

  <!-- Fond principal -->
  <g clip-path="url(#connacht-hex-clip)">
    <rect width="200" height="200" fill="url(#connacht-bg-grad)" />
  </g>

  <!-- Décor intérieur Connacht, sans toucher les bordures -->
  <g clip-path="url(#connacht-safe-clip)">
    <!-- Bande centrale bleu marine -->
    <rect
      x="50"
      y="82"
      width="100"
      height="36"
      fill="#001F3F"
      opacity="0.92"
    />

    <!-- Bande verte plus claire au centre pour rappeler l'identité du club -->
    <rect
      x="56"
      y="91"
      width="88"
      height="18"
      fill="#007A3D"
      opacity="0.9"
    />

    <!-- Bandes blanches fines éloignées du texte -->
    <rect
      x="58"
      y="66"
      width="84"
      height="5"
      fill="#FFFFFF"
      opacity="0.8"
    />

    <rect
      x="58"
      y="129"
      width="84"
      height="5"
      fill="#FFFFFF"
      opacity="0.8"
    />

    <!-- Chevrons inspirés d'un style celtique / héraldique, sans reprendre le logo officiel -->
    <path
      d="M64 78 L100 58 L136 78"
      fill="none"
      stroke="#BFEAD0"
      stroke-width="5"
      opacity="0.5"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <path
      d="M64 122 L100 142 L136 122"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="5"
      opacity="0.28"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Motif vague / vent de l'ouest, discret et loin du texte -->
    <path
      d="M56 76 C72 62, 90 62, 106 76 C120 88, 136 88, 148 76"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="4"
      opacity="0.25"
      stroke-linecap="round"
    />

    <path
      d="M52 124 C70 138, 88 138, 106 124 C122 112, 138 112, 150 124"
      fill="none"
      stroke="#BFEAD0"
      stroke-width="4"
      opacity="0.32"
      stroke-linecap="round"
    />

    <!-- Traits diagonaux discrets -->
    <path
      d="M56 136 L144 64"
      stroke="#FFFFFF"
      stroke-width="4"
      opacity="0.12"
      stroke-linecap="round"
    />

    <path
      d="M56 64 L144 136"
      stroke="#001F3F"
      stroke-width="4"
      opacity="0.22"
      stroke-linecap="round"
    />
  </g>

  <!-- Bordure extérieure noire -->
  <polygon
    points="100,10 175,50 175,150 100,190 25,150 25,50"
    fill="none"
    stroke="#000000"
    stroke-width="8"
  />

  <!-- Bordure intérieure blanche -->
  <polygon
    points="100,22 163.5,54 163.5,146 100,178 36.5,146 36.5,54"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="4"
  />

  <!-- Fine bordure vert clair -->
  <polygon
    points="100,30 156,58 156,142 100,170 44,142 44,58"
    fill="none"
    stroke="#BFEAD0"
    stroke-width="2"
  />

  <!-- Texte CONN avec contour noir -->
  <text
    x="50%"
    y="112"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="url(#connacht-text-grad)"
    stroke="#000000"
    stroke-width="7"
    paint-order="stroke"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="43"
    textLength="106"
    lengthAdjust="spacingAndGlyphs"
  >
    CONN
  </text>

  <!-- Texte CONN avec contour vert clair fin -->
  <text
    x="50%"
    y="112"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="url(#connacht-text-grad)"
    stroke="#BFEAD0"
    stroke-width="2"
    paint-order="stroke"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="43"
    textLength="106"
    lengthAdjust="spacingAndGlyphs"
  >
    CONN
  </text>
</svg>
<svg
  width="200"
  height="200"
  viewBox="0 0 200 200"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <clipPath id="bristol-hex-clip">
      <polygon points="
        100,10
        175,50
        175,150
        100,190
        25,150
        25,50
      " />
    </clipPath>

    <!-- Zone intérieure pour éviter que les décors touchent les bordures -->
    <clipPath id="bristol-safe-clip">
      <polygon points="
        100,36
        150,64
        150,136
        100,164
        50,136
        50,64
      " />
    </clipPath>

    <linearGradient id="bristol-bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#002B5C" />
      <stop offset="100%" stop-color="#00152E" />
    </linearGradient>

    <linearGradient id="bristol-text-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#D9D9D9" />
    </linearGradient>
  </defs>

  <!-- Fond principal -->
  <g clip-path="url(#bristol-hex-clip)">
    <rect width="200" height="200" fill="url(#bristol-bg-grad)" />
  </g>

  <!-- Décor intérieur Bristol Bears, sans toucher les bordures -->
  <g clip-path="url(#bristol-safe-clip)">
    <!-- Bande centrale rouge -->
    <rect
      x="50"
      y="82"
      width="100"
      height="36"
      fill="#D71920"
      opacity="0.9"
    />

    <!-- Bande bleu marine centrale pour garder le texte lisible -->
    <rect
      x="56"
      y="91"
      width="88"
      height="18"
      fill="#00152E"
      opacity="0.92"
    />

    <!-- Bandes blanches fines éloignées du texte -->
    <rect
      x="58"
      y="66"
      width="84"
      height="5"
      fill="#FFFFFF"
      opacity="0.8"
    />

    <rect
      x="58"
      y="129"
      width="84"
      height="5"
      fill="#FFFFFF"
      opacity="0.8"
    />

    <!-- Griffes stylisées en haut, esprit Bears sans reprendre le logo officiel -->
    <path
      d="M70 62 L86 84"
      stroke="#FFFFFF"
      stroke-width="5"
      opacity="0.28"
      stroke-linecap="round"
    />

    <path
      d="M100 56 L100 84"
      stroke="#FFFFFF"
      stroke-width="5"
      opacity="0.25"
      stroke-linecap="round"
    />

    <path
      d="M130 62 L114 84"
      stroke="#FFFFFF"
      stroke-width="5"
      opacity="0.28"
      stroke-linecap="round"
    />

    <!-- Griffes stylisées en bas -->
    <path
      d="M70 138 L86 116"
      stroke="#D71920"
      stroke-width="5"
      opacity="0.35"
      stroke-linecap="round"
    />

    <path
      d="M130 138 L114 116"
      stroke="#D71920"
      stroke-width="5"
      opacity="0.35"
      stroke-linecap="round"
    />

    <!-- Traits diagonaux discrets -->
    <path
      d="M56 136 L144 64"
      stroke="#FFFFFF"
      stroke-width="4"
      opacity="0.12"
      stroke-linecap="round"
    />

    <path
      d="M56 64 L144 136"
      stroke="#D71920"
      stroke-width="4"
      opacity="0.18"
      stroke-linecap="round"
    />
  </g>

  <!-- Bordure extérieure noire -->
  <polygon
    points="100,10 175,50 175,150 100,190 25,150 25,50"
    fill="none"
    stroke="#000000"
    stroke-width="8"
  />

  <!-- Bordure intérieure blanche -->
  <polygon
    points="100,22 163.5,54 163.5,146 100,178 36.5,146 36.5,54"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="4"
  />

  <!-- Fine bordure rouge -->
  <polygon
    points="100,30 156,58 156,142 100,170 44,142 44,58"
    fill="none"
    stroke="#D71920"
    stroke-width="2"
  />

  <!-- Texte BRIS avec contour noir -->
  <text
    x="50%"
    y="112"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="url(#bristol-text-grad)"
    stroke="#000000"
    stroke-width="7"
    paint-order="stroke"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="44"
    textLength="106"
    lengthAdjust="spacingAndGlyphs"
  >
    BRIS
  </text>

  <!-- Texte BRIS avec contour rouge fin -->
  <text
    x="50%"
    y="112"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="url(#bristol-text-grad)"
    stroke="#D71920"
    stroke-width="2"
    paint-order="stroke"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="44"
    textLength="106"
    lengthAdjust="spacingAndGlyphs"
  >
    BRIS
  </text>
</svg>
<svg
  width="200"
  height="200"
  viewBox="0 0 200 200"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <clipPath id="leicester-hex-clip">
      <polygon points="
        100,10
        175,50
        175,150
        100,190
        25,150
        25,50
      " />
    </clipPath>

    <!-- Zone intérieure pour éviter que les décors touchent les bordures -->
    <clipPath id="leicester-safe-clip">
      <polygon points="
        100,36
        150,64
        150,136
        100,164
        50,136
        50,64
      " />
    </clipPath>

    <linearGradient id="leicester-bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#007A3D" />
      <stop offset="100%" stop-color="#003F22" />
    </linearGradient>

    <linearGradient id="leicester-text-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#E6E6E6" />
    </linearGradient>
  </defs>

  <!-- Fond principal -->
  <g clip-path="url(#leicester-hex-clip)">
    <rect width="200" height="200" fill="url(#leicester-bg-grad)" />
  </g>

  <!-- Décor intérieur Leicester Tigers, sans toucher les bordures -->
  <g clip-path="url(#leicester-safe-clip)">
    <!-- Bande rouge centrale -->
    <rect
      x="50"
      y="82"
      width="100"
      height="36"
      fill="#D71920"
      opacity="0.9"
    />

    <!-- Bande verte sombre au centre pour garder le texte lisible -->
    <rect
      x="56"
      y="91"
      width="88"
      height="18"
      fill="#003F22"
      opacity="0.85"
    />

    <!-- Bandes blanches fines -->
    <rect
      x="58"
      y="68"
      width="84"
      height="5"
      fill="#FFFFFF"
      opacity="0.85"
    />

    <rect
      x="58"
      y="127"
      width="84"
      height="5"
      fill="#FFFFFF"
      opacity="0.85"
    />

    <!-- Griffures stylisées, sans reprendre le logo officiel -->
    <path
      d="M68 62 L92 95"
      stroke="#FFFFFF"
      stroke-width="5"
      opacity="0.25"
      stroke-linecap="round"
    />

    <path
      d="M100 55 L100 94"
      stroke="#FFFFFF"
      stroke-width="5"
      opacity="0.22"
      stroke-linecap="round"
    />

    <path
      d="M132 62 L108 95"
      stroke="#FFFFFF"
      stroke-width="5"
      opacity="0.25"
      stroke-linecap="round"
    />

    <path
      d="M68 138 L92 105"
      stroke="#D71920"
      stroke-width="5"
      opacity="0.35"
      stroke-linecap="round"
    />

    <path
      d="M132 138 L108 105"
      stroke="#D71920"
      stroke-width="5"
      opacity="0.35"
      stroke-linecap="round"
    />
  </g>

  <!-- Bordure extérieure noire -->
  <polygon
    points="100,10 175,50 175,150 100,190 25,150 25,50"
    fill="none"
    stroke="#000000"
    stroke-width="8"
  />

  <!-- Bordure intérieure blanche -->
  <polygon
    points="100,22 163.5,54 163.5,146 100,178 36.5,146 36.5,54"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="4"
  />

  <!-- Fine bordure rouge -->
  <polygon
    points="100,30 156,58 156,142 100,170 44,142 44,58"
    fill="none"
    stroke="#D71920"
    stroke-width="2"
  />

  <!-- Texte TIGERS avec contour noir -->
  <text
    x="50%"
    y="112"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="url(#leicester-text-grad)"
    stroke="#000000"
    stroke-width="5"
    paint-order="stroke"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="31"
    textLength="106"
    lengthAdjust="spacingAndGlyphs"
  >
    TIGERS
  </text>

  <!-- Texte TIGERS avec contour rouge fin -->
  <text
    x="50%"
    y="112"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="url(#leicester-text-grad)"
    stroke="#D71920"
    stroke-width="2"
    paint-order="stroke"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="31"
    textLength="106"
    lengthAdjust="spacingAndGlyphs"
  >
    TIGERS
  </text>
</svg>
<svg
  width="200"
  height="200"
  viewBox="0 0 200 200"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <!-- Hexagone -->
    <clipPath id="fcl-hex-clip">
      <polygon points="
        100,10
        175,50
        175,150
        100,190
        25,150
        25,50
      " />
    </clipPath>

    <!-- Zone intérieure safe -->
    <clipPath id="fcl-safe-clip">
      <polygon points="
        100,36
        150,64
        150,136
        100,164
        50,136
        50,64
      " />
    </clipPath>

    <!-- Dégradé fond bleu -->
    <linearGradient id="fcl-bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0033A0" />
      <stop offset="100%" stop-color="#001A50" />
    </linearGradient>

    <!-- Dégradé texte blanc -> rouge -->
    <linearGradient id="fcl-text-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#D50032" />
    </linearGradient>
  </defs>

  <!-- Fond -->
  <g clip-path="url(#fcl-hex-clip)">
    <rect width="200" height="200" fill="url(#fcl-bg-grad)" />
  </g>

  <!-- Décor interne -->
  <g clip-path="url(#fcl-safe-clip)">
    <!-- Bande centrale rouge -->
    <rect x="50" y="82" width="100" height="36" fill="#D50032" opacity="0.85" />

    <!-- Bande bleu nuit pour lisibilité -->
    <rect x="56" y="91" width="88" height="18" fill="#001A50" opacity="0.92" />

    <!-- Bandes blanches fines -->
    <rect x="58" y="66" width="84" height="5" fill="#FFFFFF" opacity="0.8" />
    <rect x="58" y="129" width="84" height="5" fill="#FFFFFF" opacity="0.8" />

    <!-- Montagne stylisée (Pic du Jer abstrait) -->
    <path
      d="M60 120 L90 90 L110 110 L140 80"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="5"
      opacity="0.25"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Croix rouge abstraite (référence Lourdes, mais non officielle) -->
    <path
      d="M100 60 L100 95 M82 77 L118 77"
      stroke="#D50032"
      stroke-width="6"
      opacity="0.22"
      stroke-linecap="round"
    />
  </g>

  <!-- Bordures -->
  <polygon
    points="100,10 175,50 175,150 100,190 25,150 25,50"
    fill="none"
    stroke="#000000"
    stroke-width="8"
  />

  <polygon
    points="100,22 163.5,54 163.5,146 100,178 36.5,146 36.5,54"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="4"
  />

  <polygon
    points="100,30 156,58 156,142 100,170 44,142 44,58"
    fill="none"
    stroke="#D50032"
    stroke-width="2"
  />

  <!-- Texte FCL -->
  <text
    x="50%"
    y="112"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="url(#fcl-text-grad)"
    stroke="#000000"
    stroke-width="7"
    paint-order="stroke"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="50"
    textLength="106"
    lengthAdjust="spacingAndGlyphs"
  >
    FCL
  </text>

  <text
    x="50%"
    y="112"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="url(#fcl-text-grad)"
    stroke="#D50032"
    stroke-width="2"
    paint-order="stroke"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="50"
    textLength="106"
    lengthAdjust="spacingAndGlyphs"
  >
    FCL
  </text>
</svg>

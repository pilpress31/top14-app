<svg
  width="200"
  height="200"
  viewBox="0 0 200 200"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <clipPath id="sharks-hex-clip">
      <polygon points="
        100,10
        175,50
        175,150
        100,190
        25,150
        25,50
      " />
    </clipPath>

    <!-- Zone intérieure pour éviter que les décors touchent les bordures -->
    <clipPath id="sharks-safe-clip">
      <polygon points="
        100,36
        150,64
        150,136
        100,164
        50,136
        50,64
      " />
    </clipPath>

    <linearGradient id="sharks-bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A2A2A" />
      <stop offset="100%" stop-color="#000000" />
    </linearGradient>

    <linearGradient id="sharks-text-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#A7A9AC" />
    </linearGradient>
  </defs>

  <!-- Fond principal -->
  <g clip-path="url(#sharks-hex-clip)">
    <rect width="200" height="200" fill="url(#sharks-bg-grad)" />
  </g>

  <!-- Décor intérieur Sharks, sans toucher les bordures -->
  <g clip-path="url(#sharks-safe-clip)">
    <!-- Bande centrale argentée -->
    <rect
      x="50"
      y="82"
      width="100"
      height="36"
      fill="#A7A9AC"
      opacity="0.75"
    />

    <!-- Bande noire centrale pour garder le texte très lisible -->
    <rect
      x="58"
      y="91"
      width="84"
      height="18"
      fill="#000000"
      opacity="0.92"
    />

    <!-- Bandes blanches fines éloignées du texte -->
    <rect
      x="58"
      y="66"
      width="84"
      height="5"
      fill="#FFFFFF"
      opacity="0.75"
    />

    <rect
      x="58"
      y="129"
      width="84"
      height="5"
      fill="#FFFFFF"
      opacity="0.75"
    />

    <!-- Aileron stylisé en haut, discret et loin du texte -->
    <path
      d="M70 78 C86 56, 108 50, 132 62 C112 64, 99 72, 88 84 Z"
      fill="#FFFFFF"
      opacity="0.18"
    />

    <!-- Vague stylisée en bas, discrète -->
    <path
      d="M54 138 C72 126, 90 126, 108 138 C124 148, 138 148, 150 138"
      fill="none"
      stroke="#A7A9AC"
      stroke-width="5"
      opacity="0.35"
      stroke-linecap="round"
    />

    <!-- Traits diagonaux argentés -->
    <path
      d="M58 64 L142 136"
      stroke="#FFFFFF"
      stroke-width="4"
      opacity="0.12"
      stroke-linecap="round"
    />

    <path
      d="M142 64 L58 136"
      stroke="#A7A9AC"
      stroke-width="4"
      opacity="0.18"
      stroke-linecap="round"
    />
  </g>

  <!-- Bordure extérieure noire -->
  <polygon
    points="100,10 175,50 175,150 100,190 25,150 25,50"
    fill="none"
    stroke="#000000"
    stroke-width="8"
  />

  <!-- Bordure intérieure blanche -->
  <polygon
    points="100,22 163.5,54 163.5,146 100,178 36.5,146 36.5,54"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="4"
  />

  <!-- Fine bordure argentée -->
  <polygon
    points="100,30 156,58 156,142 100,170 44,142 44,58"
    fill="none"
    stroke="#A7A9AC"
    stroke-width="2"
  />

  <!-- Texte SHA avec contour noir -->
  <text
    x="50%"
    y="112"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="url(#sharks-text-grad)"
    stroke="#000000"
    stroke-width="7"
    paint-order="stroke"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="50"
    textLength="106"
    lengthAdjust="spacingAndGlyphs"
  >
    SHA
  </text>

  <!-- Texte SHA avec contour argenté fin -->
  <text
    x="50%"
    y="112"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="url(#sharks-text-grad)"
    stroke="#A7A9AC"
    stroke-width="2"
    paint-order="stroke"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="50"
    textLength="106"
    lengthAdjust="spacingAndGlyphs"
  >
    SHA
  </text>
</svg>
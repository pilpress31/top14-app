<svg
  width="200"
  height="200"
  viewBox="0 0 200 200"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <clipPath id="gloucester-hex-clip">
      <polygon points="
        100,10
        175,50
        175,150
        100,190
        25,150
        25,50
      " />
    </clipPath>

    <!-- Zone intérieure pour éviter que les décors touchent les bordures -->
    <clipPath id="gloucester-safe-clip">
      <polygon points="
        100,36
        150,64
        150,136
        100,164
        50,136
        50,64
      " />
    </clipPath>

    <linearGradient id="gloucester-bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C8102E" />
      <stop offset="100%" stop-color="#7A0019" />
    </linearGradient>

    <linearGradient id="gloucester-text-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#E6E6E6" />
    </linearGradient>
  </defs>

  <!-- Fond principal -->
  <g clip-path="url(#gloucester-hex-clip)">
    <rect width="200" height="200" fill="url(#gloucester-bg-grad)" />
  </g>

  <!-- Décor intérieur Gloucester, sans toucher les bordures -->
  <g clip-path="url(#gloucester-safe-clip)">
    <!-- Bandes blanches horizontales type Cherry and Whites -->
    <rect
      x="50"
      y="58"
      width="100"
      height="14"
      fill="#FFFFFF"
      opacity="0.9"
    />

    <rect
      x="50"
      y="86"
      width="100"
      height="14"
      fill="#FFFFFF"
      opacity="0.9"
    />

    <rect
      x="50"
      y="114"
      width="100"
      height="14"
      fill="#FFFFFF"
      opacity="0.9"
    />

    <rect
      x="50"
      y="142"
      width="100"
      height="14"
      fill="#FFFFFF"
      opacity="0.9"
    />

    <!-- Bande rouge foncée centrale pour garder le texte lisible -->
    <rect
      x="56"
      y="88"
      width="88"
      height="32"
      fill="#7A0019"
      opacity="0.92"
    />

    <!-- Fines lignes rouge cerise -->
    <rect
      x="58"
      y="75"
      width="84"
      height="5"
      fill="#C8102E"
      opacity="0.85"
    />

    <rect
      x="58"
      y="132"
      width="84"
      height="5"
      fill="#C8102E"
      opacity="0.85"
    />

    <!-- Chevrons décoratifs discrets -->
    <path
      d="M64 78 L100 58 L136 78"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="5"
      opacity="0.28"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <path
      d="M64 122 L100 142 L136 122"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="5"
      opacity="0.22"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </g>

  <!-- Bordure extérieure noire -->
  <polygon
    points="100,10 175,50 175,150 100,190 25,150 25,50"
    fill="none"
    stroke="#000000"
    stroke-width="8"
  />

  <!-- Bordure intérieure blanche -->
  <polygon
    points="100,22 163.5,54 163.5,146 100,178 36.5,146 36.5,54"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="4"
  />

  <!-- Fine bordure rouge cerise -->
  <polygon
    points="100,30 156,58 156,142 100,170 44,142 44,58"
    fill="none"
    stroke="#C8102E"
    stroke-width="2"
  />

  <!-- Texte GLO avec contour noir -->
  <text
    x="50%"
    y="112"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="url(#gloucester-text-grad)"
    stroke="#000000"
    stroke-width="7"
    paint-order="stroke"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="50"
    textLength="106"
    lengthAdjust="spacingAndGlyphs"
  >
    GLO
  </text>

  <!-- Texte GLO avec contour rouge fin -->
  <text
    x="50%"
    y="112"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="url(#gloucester-text-grad)"
    stroke="#C8102E"
    stroke-width="2"
    paint-order="stroke"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="50"
    textLength="106"
    lengthAdjust="spacingAndGlyphs"
  >
    GLO
  </text>
</svg>
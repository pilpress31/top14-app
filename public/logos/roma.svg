<svg
  width="200"
  height="200"
  viewBox="0 0 200 200"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <clipPath id="roma-hex-clip">
      <polygon points="
        100,10
        175,50
        175,150
        100,190
        25,150
        25,50
      " />
    </clipPath>

    <!-- Zone intérieure pour éviter que les décors touchent les bordures -->
    <clipPath id="roma-safe-clip">
      <polygon points="
        100,36
        150,64
        150,136
        100,164
        50,136
        50,64
      " />
    </clipPath>

    <linearGradient id="roma-bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8A1538" />
      <stop offset="100%" stop-color="#3A0716" />
    </linearGradient>

    <linearGradient id="roma-gold-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD966" />
      <stop offset="55%" stop-color="#D6A51F" />
      <stop offset="100%" stop-color="#8A620E" />
    </linearGradient>

    <linearGradient id="roma-text-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#FFD966" />
    </linearGradient>
  </defs>

  <!-- Fond principal -->
  <g clip-path="url(#roma-hex-clip)">
    <rect width="200" height="200" fill="url(#roma-bg-grad)" />
  </g>

  <!-- Décor intérieur Roma -->
  <g clip-path="url(#roma-safe-clip)">
    <!-- Bande centrale or -->
    <rect
      x="50"
      y="82"
      width="100"
      height="36"
      fill="url(#roma-gold-grad)"
      opacity="0.9"
    />

    <!-- Bande bordeaux centrale pour garder le texte lisible -->
    <rect
      x="52"
      y="90"
      width="96"
      height="20"
      fill="#3A0716"
      opacity="0.93"
    />

    <!-- Bandes or style maillot -->
    <rect
      x="58"
      y="64"
      width="84"
      height="7"
      fill="#FFD966"
      opacity="0.9"
    />

    <rect
      x="58"
      y="129"
      width="84"
      height="7"
      fill="#FFD966"
      opacity="0.9"
    />

    <!-- Accents blancs -->
    <rect
      x="58"
      y="74"
      width="84"
      height="4"
      fill="#FFFFFF"
      opacity="0.7"
    />

    <rect
      x="58"
      y="122"
      width="84"
      height="4"
      fill="#FFFFFF"
      opacity="0.7"
    />

    <!-- Arches type Colisée, discrètes -->
    <path
      d="M64 118 L64 88
         C64 78, 72 70, 82 70
         C92 70, 100 78, 100 88
         L100 118"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="4"
      opacity="0.18"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <path
      d="M100 118 L100 88
         C100 78, 108 70, 118 70
         C128 70, 136 78, 136 88
         L136 118"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="4"
      opacity="0.18"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Louve / animal stylisé discret -->
    <path
      d="M62 122
         C78 104, 94 110, 104 94
         C112 82, 126 78, 140 83
         C130 88, 126 94, 128 103
         C116 99, 108 106, 99 118
         C88 132, 73 135, 62 122Z"
      fill="none"
      stroke="#FFD966"
      stroke-width="5"
      opacity="0.36"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Ballon de rugby discret -->
    <path
      d="M64 121
         C82 105, 118 105, 136 121
         C116 136, 84 136, 64 121Z"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="4"
      opacity="0.18"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Traits dynamiques -->
    <path
      d="M58 136 L142 64"
      stroke="#FFD966"
      stroke-width="4"
      opacity="0.24"
      stroke-linecap="round"
    />

    <path
      d="M58 64 L142 136"
      stroke="#FFFFFF"
      stroke-width="4"
      opacity="0.12"
      stroke-linecap="round"
    />

    <!-- Accent italien discret -->
    <path
      d="M62 100 L138 100"
      stroke="#009246"
      stroke-width="3"
      opacity="0.18"
      stroke-linecap="round"
    />

    <path
      d="M62 105 L138 105"
      stroke="#CE2B37"
      stroke-width="3"
      opacity="0.16"
      stroke-linecap="round"
    />
  </g>

  <!-- Bordure extérieure noire -->
  <polygon
    points="100,10 175,50 175,150 100,190 25,150 25,50"
    fill="none"
    stroke="#000000"
    stroke-width="8"
  />

  <!-- Bordure intérieure or -->
  <polygon
    points="100,22 163.5,54 163.5,146 100,178 36.5,146 36.5,54"
    fill="none"
    stroke="#FFD966"
    stroke-width="4"
  />

  <!-- Fine bordure blanche -->
  <polygon
    points="100,30 156,58 156,142 100,170 44,142 44,58"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="2"
    opacity="0.9"
  />

  <!-- Texte ROM avec contour noir, sans débordement -->
  <text
    x="100"
    y="111"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="url(#roma-text-grad)"
    stroke="#000000"
    stroke-width="6"
    paint-order="stroke"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="41"
    textLength="88"
    lengthAdjust="spacingAndGlyphs"
  >
    ROM
  </text>

  <!-- Contour or fin -->
  <text
    x="100"
    y="111"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="url(#roma-text-grad)"
    stroke="#FFD966"
    stroke-width="1.8"
    paint-order="stroke"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="41"
    textLength="88"
    lengthAdjust="spacingAndGlyphs"
  >
    ROM
  </text>
</svg>
<svg
  width="200"
  height="200"
  viewBox="0 0 200 200"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <clipPath id="exeter-hex-clip">
      <polygon points="
        100,10
        175,50
        175,150
        100,190
        25,150
        25,50
      " />
    </clipPath>

    <!-- Zone intérieure pour éviter que les décors touchent les bordures -->
    <clipPath id="exeter-safe-clip">
      <polygon points="
        100,36
        150,64
        150,136
        100,164
        50,136
        50,64
      " />
    </clipPath>

    <linearGradient id="exeter-bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1A1A" />
      <stop offset="100%" stop-color="#000000" />
    </linearGradient>

    <linearGradient id="exeter-text-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#D6B04A" />
    </linearGradient>
  </defs>

  <!-- Fond principal -->
  <g clip-path="url(#exeter-hex-clip)">
    <rect width="200" height="200" fill="url(#exeter-bg-grad)" />
  </g>

  <!-- Décor intérieur Exeter, sans toucher les bordures -->
  <g clip-path="url(#exeter-safe-clip)">
    <!-- Bande centrale dorée -->
    <rect
      x="50"
      y="82"
      width="100"
      height="36"
      fill="#D6B04A"
      opacity="0.9"
    />

    <!-- Bande noire centrale pour garder le texte lisible -->
    <rect
      x="56"
      y="91"
      width="88"
      height="18"
      fill="#000000"
      opacity="0.92"
    />

    <!-- Bandes blanches fines éloignées du texte -->
    <rect
      x="58"
      y="66"
      width="84"
      height="5"
      fill="#FFFFFF"
      opacity="0.8"
    />

    <rect
      x="58"
      y="129"
      width="84"
      height="5"
      fill="#FFFFFF"
      opacity="0.8"
    />

    <!-- Chevrons dorés dynamiques, sans reprendre le logo officiel -->
    <path
      d="M64 78 L100 58 L136 78"
      fill="none"
      stroke="#D6B04A"
      stroke-width="5"
      opacity="0.55"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <path
      d="M64 122 L100 142 L136 122"
      fill="none"
      stroke="#D6B04A"
      stroke-width="5"
      opacity="0.38"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Motif tribal abstrait / angulaire, très discret et non officiel -->
    <path
      d="M72 100 L88 82 L100 96 L112 82 L128 100 L112 118 L100 104 L88 118 Z"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="4"
      opacity="0.18"
      stroke-linejoin="round"
    />

    <!-- Traits diagonaux discrets -->
    <path
      d="M56 136 L144 64"
      stroke="#FFFFFF"
      stroke-width="4"
      opacity="0.12"
      stroke-linecap="round"
    />

    <path
      d="M56 64 L144 136"
      stroke="#D6B04A"
      stroke-width="4"
      opacity="0.2"
      stroke-linecap="round"
    />
  </g>

  <!-- Bordure extérieure noire -->
  <polygon
    points="100,10 175,50 175,150 100,190 25,150 25,50"
    fill="none"
    stroke="#000000"
    stroke-width="8"
  />

  <!-- Bordure intérieure blanche -->
  <polygon
    points="100,22 163.5,54 163.5,146 100,178 36.5,146 36.5,54"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="4"
  />

  <!-- Fine bordure dorée -->
  <polygon
    points="100,30 156,58 156,142 100,170 44,142 44,58"
    fill="none"
    stroke="#D6B04A"
    stroke-width="2"
  />

  <!-- Texte EXE avec contour noir -->
  <text
    x="50%"
    y="112"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="url(#exeter-text-grad)"
    stroke="#000000"
    stroke-width="7"
    paint-order="stroke"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="50"
    textLength="106"
    lengthAdjust="spacingAndGlyphs"
  >
    EXE
  </text>

  <!-- Texte EXE avec contour doré fin -->
  <text
    x="50%"
    y="112"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="url(#exeter-text-grad)"
    stroke="#D6B04A"
    stroke-width="2"
    paint-order="stroke"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="50"
    textLength="106"
    lengthAdjust="spacingAndGlyphs"
  >
    EXE
  </text>
</svg>
<svg
  width="200"
  height="200"
  viewBox="0 0 200 200"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <clipPath id="usq-hex-clip">
      <polygon points="100,10 175,50 175,150 100,190 25,150 25,50" />
    </clipPath>

    <clipPath id="usq-safe-clip">
      <polygon points="100,36 150,64 150,136 100,164 50,136 50,64" />
    </clipPath>

    <linearGradient id="usq-bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D50032" />
      <stop offset="100%" stop-color="#7A001A" />
    </linearGradient>

    <linearGradient id="usq-text-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#FFD6D6" />
    </linearGradient>
  </defs>

  <!-- Fond -->
  <g clip-path="url(#usq-hex-clip)">
    <rect width="200" height="200" fill="url(#usq-bg-grad)" />
  </g>

  <!-- Décor interne -->
  <g clip-path="url(#usq-safe-clip)">
    <!-- Bande centrale blanche -->
    <rect x="50" y="82" width="100" height="36" fill="#FFFFFF" opacity="0.85" />

    <!-- Bande rouge foncé -->
    <rect x="56" y="91" width="88" height="18" fill="#7A001A" opacity="0.92" />

    <!-- Bandes fines -->
    <rect x="58" y="66" width="84" height="5" fill="#FFFFFF" opacity="0.8" />
    <rect x="58" y="129" width="84" height="5" fill="#FFFFFF" opacity="0.8" />

    <!-- Motif diagonal -->
    <path
      d="M56 136 L144 64"
      stroke="#FFFFFF"
      stroke-width="4"
      opacity="0.12"
      stroke-linecap="round"
    />

    <!-- Motif héraldique (chevron) -->
    <path
      d="M64 120 L100 95 L136 120"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="5"
      opacity="0.28"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </g>

  <!-- Bordures -->
  <polygon
    points="100,10 175,50 175,150 100,190 25,150 25,50"
    fill="none"
    stroke="#000000"
    stroke-width="8"
  />

  <polygon
    points="100,22 163.5,54 163.5,146 100,178 36.5,146 36.5,54"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="4"
  />

  <polygon
    points="100,30 156,58 156,142 100,170 44,142 44,58"
    fill="none"
    stroke="#D50032"
    stroke-width="2"
  />

  <!-- Texte USQ (safe-zone) -->
  <text
    x="50%"
    y="112"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="url(#usq-text-grad)"
    stroke="#000000"
    stroke-width="7"
    paint-order="stroke"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="40"
    textLength="100"
    lengthAdjust="spacingAndGlyphs"
  >
    USQ
  </text>

  <text
    x="50%"
    y="112"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="url(#usq-text-grad)"
    stroke="#FFFFFF"
    stroke-width="2"
    paint-order="stroke"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="40"
    textLength="100"
    lengthAdjust="spacingAndGlyphs"
  >
    USQ
  </text>
</svg>

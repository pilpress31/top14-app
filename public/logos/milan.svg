<svg
  width="200"
  height="200"
  viewBox="0 0 200 200"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <clipPath id="milan-hex-clip">
      <polygon points="
        100,10
        175,50
        175,150
        100,190
        25,150
        25,50
      " />
    </clipPath>

    <!-- Zone intérieure pour éviter que les décors touchent les bordures -->
    <clipPath id="milan-safe-clip">
      <polygon points="
        100,36
        150,64
        150,136
        100,164
        50,136
        50,64
      " />
    </clipPath>

    <linearGradient id="milan-bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1A1A" />
      <stop offset="100%" stop-color="#000000" />
    </linearGradient>

    <linearGradient id="milan-red-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E31B23" />
      <stop offset="60%" stop-color="#B00018" />
      <stop offset="100%" stop-color="#5A0008" />
    </linearGradient>

    <linearGradient id="milan-text-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#FFB3B3" />
    </linearGradient>
  </defs>

  <!-- Fond principal -->
  <g clip-path="url(#milan-hex-clip)">
    <rect width="200" height="200" fill="url(#milan-bg-grad)" />
  </g>

  <!-- Décor intérieur Milan -->
  <g clip-path="url(#milan-safe-clip)">
    <!-- Bande centrale rouge -->
    <rect
      x="50"
      y="82"
      width="100"
      height="36"
      fill="url(#milan-red-grad)"
      opacity="0.92"
    />

    <!-- Bande noire centrale pour garder le texte lisible -->
    <rect
      x="52"
      y="90"
      width="96"
      height="20"
      fill="#000000"
      opacity="0.92"
    />

    <!-- Bandes rouges/noires style maillot -->
    <rect
      x="58"
      y="64"
      width="84"
      height="7"
      fill="#E31B23"
      opacity="0.9"
    />

    <rect
      x="58"
      y="129"
      width="84"
      height="7"
      fill="#E31B23"
      opacity="0.9"
    />

    <rect
      x="58"
      y="74"
      width="84"
      height="4"
      fill="#FFFFFF"
      opacity="0.65"
    />

    <rect
      x="58"
      y="122"
      width="84"
      height="4"
      fill="#FFFFFF"
      opacity="0.65"
    />

    <!-- Croix stylisée de Milan, discrète -->
    <path
      d="M96 56 L104 56 L104 91 L136 91 L136 99 L104 99 L104 134 L96 134 L96 99 L64 99 L64 91 L96 91Z"
      fill="#FFFFFF"
      opacity="0.16"
    />

    <!-- Ballon de rugby abstrait -->
    <path
      d="M64 121
         C82 105, 118 105, 136 121
         C116 136, 84 136, 64 121Z"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="4"
      opacity="0.22"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Motif dynamique rouge -->
    <path
      d="M62 78
         C80 62, 104 61, 132 78
         C114 72, 92 72, 62 78Z"
      fill="none"
      stroke="#E31B23"
      stroke-width="5"
      opacity="0.35"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <path
      d="M68 126
         C86 140, 114 140, 132 126"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="5"
      opacity="0.18"
      stroke-linecap="round"
    />

    <!-- Traits diagonaux dynamiques -->
    <path
      d="M58 136 L142 64"
      stroke="#E31B23"
      stroke-width="4"
      opacity="0.24"
      stroke-linecap="round"
    />

    <path
      d="M58 64 L142 136"
      stroke="#FFFFFF"
      stroke-width="4"
      opacity="0.12"
      stroke-linecap="round"
    />

    <!-- Accent italien discret -->
    <path
      d="M62 100 L138 100"
      stroke="#009246"
      stroke-width="3"
      opacity="0.18"
      stroke-linecap="round"
    />

    <path
      d="M62 105 L138 105"
      stroke="#CE2B37"
      stroke-width="3"
      opacity="0.18"
      stroke-linecap="round"
    />
  </g>

  <!-- Bordure extérieure noire -->
  <polygon
    points="100,10 175,50 175,150 100,190 25,150 25,50"
    fill="none"
    stroke="#000000"
    stroke-width="8"
  />

  <!-- Bordure intérieure rouge -->
  <polygon
    points="100,22 163.5,54 163.5,146 100,178 36.5,146 36.5,54"
    fill="none"
    stroke="#E31B23"
    stroke-width="4"
  />

  <!-- Fine bordure blanche -->
  <polygon
    points="100,30 156,58 156,142 100,170 44,142 44,58"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="2"
    opacity="0.9"
  />

  <!-- Texte MIL avec contour noir, sans débordement -->
  <text
    x="100"
    y="111"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="url(#milan-text-grad)"
    stroke="#000000"
    stroke-width="6"
    paint-order="stroke"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="42"
    textLength="82"
    lengthAdjust="spacingAndGlyphs"
  >
    MIL
  </text>

  <!-- Contour rouge fin -->
  <text
    x="100"
    y="111"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="url(#milan-text-grad)"
    stroke="#E31B23"
    stroke-width="1.8"
    paint-order="stroke"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="42"
    textLength="82"
    lengthAdjust="spacingAndGlyphs"
  >
    MIL
  </text>
</svg>
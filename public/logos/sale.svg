<svg
  width="200"
  height="200"
  viewBox="0 0 200 200"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <clipPath id="sale-hex-clip">
      <polygon points="
        100,10
        175,50
        175,150
        100,190
        25,150
        25,50
      " />
    </clipPath>

    <!-- Zone intérieure pour éviter que les décors touchent les bordures -->
    <clipPath id="sale-safe-clip">
      <polygon points="
        100,36
        150,64
        150,136
        100,164
        50,136
        50,64
      " />
    </clipPath>

    <linearGradient id="sale-bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#003B73" />
      <stop offset="100%" stop-color="#001A3A" />
    </linearGradient>

    <linearGradient id="sale-text-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#7EC8E3" />
    </linearGradient>
  </defs>

  <!-- Fond principal -->
  <g clip-path="url(#sale-hex-clip)">
    <rect width="200" height="200" fill="url(#sale-bg-grad)" />
  </g>

  <!-- Décor intérieur Sale Sharks, sans toucher les bordures -->
  <g clip-path="url(#sale-safe-clip)">
    <!-- Grande bande centrale bleu clair -->
    <rect
      x="50"
      y="82"
      width="100"
      height="36"
      fill="#7EC8E3"
      opacity="0.85"
    />

    <!-- Bande centrale bleu marine pour améliorer la lisibilité du texte -->
    <rect
      x="56"
      y="90"
      width="88"
      height="20"
      fill="#002B5C"
      opacity="0.85"
    />

    <!-- Bandes blanches fines, éloignées du texte -->
    <rect
      x="58"
      y="62"
      width="84"
      height="5"
      fill="#FFFFFF"
      opacity="0.75"
    />

    <rect
      x="58"
      y="133"
      width="84"
      height="5"
      fill="#FFFFFF"
      opacity="0.75"
    />

    <!-- Vagues stylisées en haut, loin du texte -->
    <path
      d="M56 72 C72 62, 88 62, 104 72 C120 82, 134 82, 148 72"
      fill="none"
      stroke="#7EC8E3"
      stroke-width="4"
      opacity="0.45"
      stroke-linecap="round"
    />

    <!-- Vagues stylisées en bas, loin du texte -->
    <path
      d="M52 128 C70 118, 88 118, 106 128 C122 138, 136 138, 150 128"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="4"
      opacity="0.28"
      stroke-linecap="round"
    />
  </g>

  <!-- Bordure extérieure noire -->
  <polygon
    points="100,10 175,50 175,150 100,190 25,150 25,50"
    fill="none"
    stroke="#000000"
    stroke-width="8"
  />

  <!-- Bordure intérieure blanche -->
  <polygon
    points="100,22 163.5,54 163.5,146 100,178 36.5,146 36.5,54"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="4"
  />

  <!-- Fine bordure bleu clair -->
  <polygon
    points="100,30 156,58 156,142 100,170 44,142 44,58"
    fill="none"
    stroke="#7EC8E3"
    stroke-width="2"
  />

  <!-- Texte SALE avec contour noir -->
  <text
    x="50%"
    y="112"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="url(#sale-text-grad)"
    stroke="#000000"
    stroke-width="6"
    paint-order="stroke"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="42"
    textLength="106"
    lengthAdjust="spacingAndGlyphs"
  >
    SALE
  </text>

  <!-- Texte SALE avec contour bleu clair fin -->
  <text
    x="50%"
    y="112"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="url(#sale-text-grad)"
    stroke="#7EC8E3"
    stroke-width="2"
    paint-order="stroke"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="42"
    textLength="106"
    lengthAdjust="spacingAndGlyphs"
  >
    SALE
  </text>
</svg>
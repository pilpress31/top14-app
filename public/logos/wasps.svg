<svg
  width="200"
  height="200"
  viewBox="0 0 200 200"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <clipPath id="wasps-hex-clip">
      <polygon points="
        100,10
        175,50
        175,150
        100,190
        25,150
        25,50
      " />
    </clipPath>

    <clipPath id="wasps-safe-clip">
      <polygon points="
        100,36
        150,64
        150,136
        100,164
        50,136
        50,64
      " />
    </clipPath>

    <linearGradient id="wasps-bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1A1A" />
      <stop offset="100%" stop-color="#000000" />
    </linearGradient>

    <linearGradient id="wasps-gold-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD95A" />
      <stop offset="55%" stop-color="#D6A51F" />
      <stop offset="100%" stop-color="#8A620E" />
    </linearGradient>

    <linearGradient id="wasps-text-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE680" />
      <stop offset="100%" stop-color="#C9981B" />
    </linearGradient>
  </defs>

  <!-- Fond principal -->
  <g clip-path="url(#wasps-hex-clip)">
    <rect width="200" height="200" fill="url(#wasps-bg-grad)" />
  </g>

  <!-- Décor intérieur -->
  <g clip-path="url(#wasps-safe-clip)">
    <!-- Bande centrale or -->
    <rect
      x="50"
      y="82"
      width="100"
      height="36"
      fill="url(#wasps-gold-grad)"
      opacity="0.92"
    />

    <!-- Bande noire centrale plus large pour le texte -->
    <rect
      x="52"
      y="90"
      width="96"
      height="20"
      fill="#000000"
      opacity="0.9"
    />

    <!-- Bandes or façon guêpe -->
    <rect
      x="58"
      y="64"
      width="84"
      height="7"
      fill="#F4C542"
      opacity="0.9"
    />

    <rect
      x="58"
      y="129"
      width="84"
      height="7"
      fill="#F4C542"
      opacity="0.9"
    />

    <!-- Ailes stylisées discrètes -->
    <path
      d="M64 80 C78 58, 104 58, 116 80 C98 73, 82 73, 64 80"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="5"
      opacity="0.18"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <path
      d="M84 80 C98 58, 124 58, 138 80 C120 73, 102 73, 84 80"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="5"
      opacity="0.14"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Corps de guêpe abstrait -->
    <path
      d="M63 121 C82 139, 118 139, 137 121"
      fill="none"
      stroke="#F4C542"
      stroke-width="6"
      opacity="0.45"
      stroke-linecap="round"
    />

    <path
      d="M68 100 C86 84, 114 84, 132 100 C114 116, 86 116, 68 100"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="4"
      opacity="0.16"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Traits diagonaux dynamiques -->
    <path
      d="M56 136 L144 64"
      stroke="#F4C542"
      stroke-width="4"
      opacity="0.18"
      stroke-linecap="round"
    />

    <path
      d="M56 64 L144 136"
      stroke="#FFFFFF"
      stroke-width="4"
      opacity="0.1"
      stroke-linecap="round"
    />
  </g>

  <!-- Bordure extérieure noire -->
  <polygon
    points="100,10 175,50 175,150 100,190 25,150 25,50"
    fill="none"
    stroke="#000000"
    stroke-width="8"
  />

  <!-- Bordure intérieure or -->
  <polygon
    points="100,22 163.5,54 163.5,146 100,178 36.5,146 36.5,54"
    fill="none"
    stroke="#F4C542"
    stroke-width="4"
  />

  <!-- Fine bordure or pâle -->
  <polygon
    points="100,30 156,58 156,142 100,170 44,142 44,58"
    fill="none"
    stroke="#FFE680"
    stroke-width="2"
    opacity="0.9"
  />

  <!-- Texte WAS réduit pour ne pas déborder -->
  <text
    x="100"
    y="111"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="url(#wasps-text-grad)"
    stroke="#000000"
    stroke-width="6"
    paint-order="stroke"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="44"
    textLength="92"
    lengthAdjust="spacingAndGlyphs"
  >
    WAS
  </text>

  <!-- Contour or fin -->
  <text
    x="100"
    y="111"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="url(#wasps-text-grad)"
    stroke="#F4C542"
    stroke-width="1.8"
    paint-order="stroke"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="44"
    textLength="92"
    lengthAdjust="spacingAndGlyphs"
  >
    WAS
  </text>
</svg>
<svg
  width="200"
  height="200"
  viewBox="0 0 200 200"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <clipPath id="munster-hex-clip">
      <polygon points="
        100,10
        175,50
        175,150
        100,190
        25,150
        25,50
      " />
    </clipPath>

    <!-- Zone intérieure pour éviter que les décors touchent les bordures -->
    <clipPath id="munster-safe-clip">
      <polygon points="
        100,36
        150,64
        150,136
        100,164
        50,136
        50,64
      " />
    </clipPath>

    <linearGradient id="munster-bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C8102E" />
      <stop offset="100%" stop-color="#7A0019" />
    </linearGradient>

    <linearGradient id="munster-text-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#D9D9D9" />
    </linearGradient>
  </defs>

  <!-- Fond principal -->
  <g clip-path="url(#munster-hex-clip)">
    <rect width="200" height="200" fill="url(#munster-bg-grad)" />
  </g>

  <!-- Décor intérieur Munster, sans toucher les bordures -->
  <g clip-path="url(#munster-safe-clip)">
    <!-- Bande bleu marine centrale -->
    <rect
      x="50"
      y="82"
      width="100"
      height="36"
      fill="#001F3F"
      opacity="0.95"
    />

    <!-- Bandes blanches fines -->
    <rect
      x="58"
      y="68"
      width="84"
      height="5"
      fill="#FFFFFF"
      opacity="0.8"
    />

    <rect
      x="58"
      y="127"
      width="84"
      height="5"
      fill="#FFFFFF"
      opacity="0.8"
    />

    <!-- Chevrons blancs inspirés de l'esprit héraldique, sans reprendre le logo officiel -->
    <path
      d="M64 78 L100 58 L136 78"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="5"
      opacity="0.35"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <path
      d="M64 122 L100 142 L136 122"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="5"
      opacity="0.28"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Croix discrète bleu marine -->
    <rect
      x="96"
      y="46"
      width="8"
      height="108"
      fill="#001F3F"
      opacity="0.35"
    />

    <rect
      x="58"
      y="96"
      width="84"
      height="8"
      fill="#001F3F"
      opacity="0.35"
    />
  </g>

  <!-- Bordure extérieure noire -->
  <polygon
    points="100,10 175,50 175,150 100,190 25,150 25,50"
    fill="none"
    stroke="#000000"
    stroke-width="8"
  />

  <!-- Bordure intérieure blanche -->
  <polygon
    points="100,22 163.5,54 163.5,146 100,178 36.5,146 36.5,54"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="4"
  />

  <!-- Fine bordure bleu marine -->
  <polygon
    points="100,30 156,58 156,142 100,170 44,142 44,58"
    fill="none"
    stroke="#001F3F"
    stroke-width="2"
  />

  <!-- Texte MUN avec contour noir -->
  <text
    x="50%"
    y="112"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="url(#munster-text-grad)"
    stroke="#000000"
    stroke-width="7"
    paint-order="stroke"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="50"
    textLength="106"
    lengthAdjust="spacingAndGlyphs"
  >
    MUN
  </text>

  <!-- Texte MUN avec contour bleu marine fin -->
  <text
    x="50%"
    y="112"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="url(#munster-text-grad)"
    stroke="#001F3F"
    stroke-width="2"
    paint-order="stroke"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="50"
    textLength="106"
    lengthAdjust="spacingAndGlyphs"
  >
    MUN
  </text>
</svg>
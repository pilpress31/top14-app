<svg
  width="200"
  height="200"
  viewBox="0 0 200 200"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <clipPath id="leeds-tykes-hex-clip">
      <polygon points="
        100,10
        175,50
        175,150
        100,190
        25,150
        25,50
      " />
    </clipPath>

    <clipPath id="leeds-tykes-safe-clip">
      <polygon points="
        100,36
        150,64
        150,136
        100,164
        50,136
        50,64
      " />
    </clipPath>

    <linearGradient id="leeds-tykes-bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#003A70" />
      <stop offset="100%" stop-color="#001B3A" />
    </linearGradient>

    <linearGradient id="leeds-tykes-gold-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD966" />
      <stop offset="55%" stop-color="#D6A51F" />
      <stop offset="100%" stop-color="#8A620E" />
    </linearGradient>

    <linearGradient id="leeds-tykes-text-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#FFD966" />
    </linearGradient>
  </defs>

  <!-- Fond principal -->
  <g clip-path="url(#leeds-tykes-hex-clip)">
    <rect width="200" height="200" fill="url(#leeds-tykes-bg-grad)" />
  </g>

  <!-- Décor intérieur Leeds Tykes -->
  <g clip-path="url(#leeds-tykes-safe-clip)">
    <!-- Bande centrale or -->
    <rect
      x="50"
      y="82"
      width="100"
      height="36"
      fill="url(#leeds-tykes-gold-grad)"
      opacity="0.9"
    />

    <!-- Bande bleue centrale pour garder le texte lisible -->
    <rect
      x="52"
      y="90"
      width="96"
      height="20"
      fill="#001B3A"
      opacity="0.92"
    />

    <!-- Bandes blanches -->
    <rect
      x="58"
      y="64"
      width="84"
      height="7"
      fill="#FFFFFF"
      opacity="0.85"
    />

    <rect
      x="58"
      y="129"
      width="84"
      height="7"
      fill="#FFFFFF"
      opacity="0.85"
    />

    <!-- Accents or -->
    <rect
      x="58"
      y="74"
      width="84"
      height="4"
      fill="#FFD966"
      opacity="0.85"
    />

    <rect
      x="58"
      y="122"
      width="84"
      height="4"
      fill="#FFD966"
      opacity="0.85"
    />

    <!-- Rose du Yorkshire stylisée -->
    <path
      d="M100 56
         C106 70, 122 67, 124 82
         C111 80, 105 88, 100 100
         C95 88, 89 80, 76 82
         C78 67, 94 70, 100 56Z"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="5"
      opacity="0.3"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <path
      d="M82 105
         C91 94, 109 94, 118 105
         C108 116, 92 116, 82 105Z"
      fill="none"
      stroke="#FFD966"
      stroke-width="5"
      opacity="0.4"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Ballon de rugby abstrait -->
    <path
      d="M64 121
         C82 105, 118 105, 136 121
         C116 136, 84 136, 64 121Z"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="4"
      opacity="0.2"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Traits dynamiques -->
    <path
      d="M58 136 L142 64"
      stroke="#FFFFFF"
      stroke-width="4"
      opacity="0.14"
      stroke-linecap="round"
    />

    <path
      d="M58 64 L142 136"
      stroke="#FFD966"
      stroke-width="4"
      opacity="0.22"
      stroke-linecap="round"
    />

    <path
      d="M62 100 L138 100"
      stroke="#FFFFFF"
      stroke-width="3"
      opacity="0.18"
      stroke-linecap="round"
    />
  </g>

  <!-- Bordure extérieure noire -->
  <polygon
    points="100,10 175,50 175,150 100,190 25,150 25,50"
    fill="none"
    stroke="#000000"
    stroke-width="8"
  />

  <!-- Bordure intérieure blanche -->
  <polygon
    points="100,22 163.5,54 163.5,146 100,178 36.5,146 36.5,54"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="4"
  />

  <!-- Fine bordure or -->
  <polygon
    points="100,30 156,58 156,142 100,170 44,142 44,58"
    fill="none"
    stroke="#FFD966"
    stroke-width="2"
    opacity="0.95"
  />

  <!-- Texte TYK avec contour noir, sans débordement -->
  <text
    x="100"
    y="111"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="url(#leeds-tykes-text-grad)"
    stroke="#000000"
    stroke-width="6"
    paint-order="stroke"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="42"
    textLength="86"
    lengthAdjust="spacingAndGlyphs"
  >
    TYK
  </text>

  <!-- Contour or fin -->
  <text
    x="100"
    y="111"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="url(#leeds-tykes-text-grad)"
    stroke="#FFD966"
    stroke-width="1.8"
    paint-order="stroke"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="42"
    textLength="86"
    lengthAdjust="spacingAndGlyphs"
  >
    TYK
  </text>
</svg>
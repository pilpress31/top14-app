<svg
  width="200"
  height="200"
  viewBox="0 0 200 200"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <clipPath id="scarlets-hex-clip">
      <polygon points="
        100,10
        175,50
        175,150
        100,190
        25,150
        25,50
      " />
    </clipPath>

    <!-- Zone intérieure pour éviter que les décors touchent les bordures -->
    <clipPath id="scarlets-safe-clip">
      <polygon points="
        100,36
        150,64
        150,136
        100,164
        50,136
        50,64
      " />
    </clipPath>

    <linearGradient id="scarlets-bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D71920" />
      <stop offset="100%" stop-color="#8A0015" />
    </linearGradient>

    <linearGradient id="scarlets-text-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#F2C94C" />
    </linearGradient>
  </defs>

  <!-- Fond principal -->
  <g clip-path="url(#scarlets-hex-clip)">
    <rect width="200" height="200" fill="url(#scarlets-bg-grad)" />
  </g>

  <!-- Décor intérieur Scarlets, sans toucher les bordures -->
  <g clip-path="url(#scarlets-safe-clip)">
    <!-- Bande centrale dorée -->
    <rect
      x="50"
      y="82"
      width="100"
      height="36"
      fill="#F2C94C"
      opacity="0.9"
    />

    <!-- Bande rouge foncé centrale pour garder le texte lisible -->
    <rect
      x="56"
      y="91"
      width="88"
      height="18"
      fill="#8A0015"
      opacity="0.92"
    />

    <!-- Bandes blanches fines éloignées du texte -->
    <rect
      x="58"
      y="66"
      width="84"
      height="5"
      fill="#FFFFFF"
      opacity="0.8"
    />

    <rect
      x="58"
      y="129"
      width="84"
      height="5"
      fill="#FFFFFF"
      opacity="0.8"
    />

    <!-- Chevrons dorés, esprit gallois/héraldique sans reprendre le logo officiel -->
    <path
      d="M64 78 L100 58 L136 78"
      fill="none"
      stroke="#F2C94C"
      stroke-width="5"
      opacity="0.5"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <path
      d="M64 122 L100 142 L136 122"
      fill="none"
      stroke="#F2C94C"
      stroke-width="5"
      opacity="0.38"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Traits diagonaux blancs discrets -->
    <path
      d="M56 136 L144 64"
      stroke="#FFFFFF"
      stroke-width="4"
      opacity="0.12"
      stroke-linecap="round"
    />

    <path
      d="M56 64 L144 136"
      stroke="#F2C94C"
      stroke-width="4"
      opacity="0.2"
      stroke-linecap="round"
    />

    <!-- Petit motif flamme abstrait, discret et éloigné du texte -->
    <path
      d="M100 54 C92 66, 95 76, 100 84 C106 74, 112 64, 100 54"
      fill="#FFFFFF"
      opacity="0.18"
    />

    <path
      d="M100 146 C108 134, 105 124, 100 116 C94 126, 88 136, 100 146"
      fill="#F2C94C"
      opacity="0.22"
    />
  </g>

  <!-- Bordure extérieure noire -->
  <polygon
    points="100,10 175,50 175,150 100,190 25,150 25,50"
    fill="none"
    stroke="#000000"
    stroke-width="8"
  />

  <!-- Bordure intérieure blanche -->
  <polygon
    points="100,22 163.5,54 163.5,146 100,178 36.5,146 36.5,54"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="4"
  />

  <!-- Fine bordure dorée -->
  <polygon
    points="100,30 156,58 156,142 100,170 44,142 44,58"
    fill="none"
    stroke="#F2C94C"
    stroke-width="2"
  />

  <!-- Texte SCA avec contour noir -->
  <text
    x="50%"
    y="112"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="url(#scarlets-text-grad)"
    stroke="#000000"
    stroke-width="7"
    paint-order="stroke"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="50"
    textLength="106"
    lengthAdjust="spacingAndGlyphs"
  >
    SCA
  </text>

  <!-- Texte SCA avec contour doré fin -->
  <text
    x="50%"
    y="112"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="url(#scarlets-text-grad)"
    stroke="#F2C94C"
    stroke-width="2"
    paint-order="stroke"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="50"
    textLength="106"
    lengthAdjust="spacingAndGlyphs"
  >
    SCA
  </text>
</svg>
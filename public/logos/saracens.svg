<svg
  width="200"
  height="200"
  viewBox="0 0 200 200"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <clipPath id="saracens-hex-clip">
      <polygon points="
        100,10
        175,50
        175,150
        100,190
        25,150
        25,50
      " />
    </clipPath>

    <!-- Zone intérieure pour éviter que les décors touchent les bordures -->
    <clipPath id="saracens-safe-clip">
      <polygon points="
        100,36
        150,64
        150,136
        100,164
        50,136
        50,64
      " />
    </clipPath>

    <linearGradient id="saracens-bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1A1A" />
      <stop offset="100%" stop-color="#000000" />
    </linearGradient>

    <linearGradient id="saracens-text-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#D9D9D9" />
    </linearGradient>
  </defs>

  <!-- Fond principal -->
  <g clip-path="url(#saracens-hex-clip)">
    <rect width="200" height="200" fill="url(#saracens-bg-grad)" />
  </g>

  <!-- Décor intérieur Saracens, sans toucher les bordures -->
  <g clip-path="url(#saracens-safe-clip)">
    <!-- Grande bande rouge centrale -->
    <rect x="50" y="82" width="100" height="36" fill="#D71920" />

    <!-- Bandes blanches fines -->
    <rect x="50" y="72" width="100" height="6" fill="#FFFFFF" opacity="0.95" />
    <rect x="50" y="122" width="100" height="6" fill="#FFFFFF" opacity="0.95" />

    <!-- Bandes rouges verticales discrètes -->
    <rect x="68" y="36" width="10" height="128" fill="#D71920" opacity="0.55" />
    <rect x="122" y="36" width="10" height="128" fill="#D71920" opacity="0.55" />

    <!-- Forme en V inspirée d’un motif guerrier, sans reprendre le logo officiel -->
    <path
      d="M60 58 L100 100 L140 58"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="5"
      opacity="0.28"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <path
      d="M60 142 L100 100 L140 142"
      fill="none"
      stroke="#D71920"
      stroke-width="5"
      opacity="0.35"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </g>

  <!-- Bordure extérieure noire -->
  <polygon
    points="100,10 175,50 175,150 100,190 25,150 25,50"
    fill="none"
    stroke="#000000"
    stroke-width="8"
  />

  <!-- Bordure intérieure blanche -->
  <polygon
    points="100,22 163.5,54 163.5,146 100,178 36.5,146 36.5,54"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="4"
  />

  <!-- Fine bordure rouge -->
  <polygon
    points="100,30 156,58 156,142 100,170 44,142 44,58"
    fill="none"
    stroke="#D71920"
    stroke-width="2"
  />

  <!-- Texte SARRIES avec contour noir -->
  <text
    x="50%"
    y="112"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="url(#saracens-text-grad)"
    stroke="#000000"
    stroke-width="5"
    paint-order="stroke"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="29"
    textLength="106"
    lengthAdjust="spacingAndGlyphs"
  >
    SARRIES
  </text>

  <!-- Texte SARRIES avec contour rouge fin -->
  <text
    x="50%"
    y="112"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="url(#saracens-text-grad)"
    stroke="#D71920"
    stroke-width="2"
    paint-order="stroke"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="29"
    textLength="106"
    lengthAdjust="spacingAndGlyphs"
  >
    SARRIES
  </text>
</svg>
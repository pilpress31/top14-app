<svg
  width="200"
  height="200"
  viewBox="0 0 200 200"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <clipPath id="laquila-hex-clip">
      <polygon points="
        100,10
        175,50
        175,150
        100,190
        25,150
        25,50
      " />
    </clipPath>

    <!-- Zone intérieure pour éviter que les décors touchent les bordures -->
    <clipPath id="laquila-safe-clip">
      <polygon points="
        100,36
        150,64
        150,136
        100,164
        50,136
        50,64
      " />
    </clipPath>

    <linearGradient id="laquila-bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111111" />
      <stop offset="100%" stop-color="#000000" />
    </linearGradient>

    <linearGradient id="laquila-green-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00A651" />
      <stop offset="60%" stop-color="#007A3D" />
      <stop offset="100%" stop-color="#004D28" />
    </linearGradient>

    <linearGradient id="laquila-text-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#9BE7B2" />
    </linearGradient>
  </defs>

  <!-- Fond principal -->
  <g clip-path="url(#laquila-hex-clip)">
    <rect width="200" height="200" fill="url(#laquila-bg-grad)" />
  </g>

  <!-- Décor intérieur L'Aquila -->
  <g clip-path="url(#laquila-safe-clip)">
    <!-- Bande centrale verte -->
    <rect
      x="50"
      y="82"
      width="100"
      height="36"
      fill="url(#laquila-green-grad)"
      opacity="0.9"
    />

    <!-- Bande noire centrale pour garder le texte lisible -->
    <rect
      x="52"
      y="90"
      width="96"
      height="20"
      fill="#000000"
      opacity="0.92"
    />

    <!-- Bandes vertes/noires style rugby -->
    <rect
      x="58"
      y="64"
      width="84"
      height="7"
      fill="#00A651"
      opacity="0.9"
    />

    <rect
      x="58"
      y="129"
      width="84"
      height="7"
      fill="#00A651"
      opacity="0.9"
    />

    <rect
      x="58"
      y="74"
      width="84"
      height="4"
      fill="#FFFFFF"
      opacity="0.7"
    />

    <rect
      x="58"
      y="122"
      width="84"
      height="4"
      fill="#FFFFFF"
      opacity="0.7"
    />

    <!-- Aigle stylisé discret -->
    <path
      d="M58 82
         C75 65, 92 65, 100 78
         C108 65, 125 65, 142 82
         C126 79, 113 84, 103 97
         C101 99, 99 99, 97 97
         C87 84, 74 79, 58 82Z"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="5"
      opacity="0.26"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Tête / bec abstrait -->
    <path
      d="M100 76
         C106 86, 113 91, 124 94
         C113 98, 106 104, 100 114
         C94 104, 87 98, 76 94
         C87 91, 94 86, 100 76Z"
      fill="none"
      stroke="#00A651"
      stroke-width="5"
      opacity="0.38"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Ballon de rugby discret -->
    <path
      d="M64 122
         C82 106, 118 106, 136 122
         C116 137, 84 137, 64 122Z"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="4"
      opacity="0.2"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Traits dynamiques -->
    <path
      d="M58 136 L142 64"
      stroke="#00A651"
      stroke-width="4"
      opacity="0.22"
      stroke-linecap="round"
    />

    <path
      d="M58 64 L142 136"
      stroke="#FFFFFF"
      stroke-width="4"
      opacity="0.12"
      stroke-linecap="round"
    />

    <!-- Accent italien discret -->
    <path
      d="M62 100 L138 100"
      stroke="#009246"
      stroke-width="3"
      opacity="0.22"
      stroke-linecap="round"
    />

    <path
      d="M62 105 L138 105"
      stroke="#CE2B37"
      stroke-width="3"
      opacity="0.16"
      stroke-linecap="round"
    />
  </g>

  <!-- Bordure extérieure noire -->
  <polygon
    points="100,10 175,50 175,150 100,190 25,150 25,50"
    fill="none"
    stroke="#000000"
    stroke-width="8"
  />

  <!-- Bordure intérieure verte -->
  <polygon
    points="100,22 163.5,54 163.5,146 100,178 36.5,146 36.5,54"
    fill="none"
    stroke="#00A651"
    stroke-width="4"
  />

  <!-- Fine bordure blanche -->
  <polygon
    points="100,30 156,58 156,142 100,170 44,142 44,58"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="2"
    opacity="0.9"
  />

  <!-- Texte AQU avec contour noir, sans débordement -->
  <text
    x="100"
    y="111"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="url(#laquila-text-grad)"
    stroke="#000000"
    stroke-width="6"
    paint-order="stroke"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="41"
    textLength="86"
    lengthAdjust="spacingAndGlyphs"
  >
    AQU
  </text>

  <!-- Contour vert fin -->
  <text
    x="100"
    y="111"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="url(#laquila-text-grad)"
    stroke="#00A651"
    stroke-width="1.8"
    paint-order="stroke"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="41"
    textLength="86"
    lengthAdjust="spacingAndGlyphs"
  >
    AQU
  </text>
</svg>
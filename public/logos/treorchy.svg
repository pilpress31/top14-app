<svg width="512" height="512" viewBox="0 0 512 512"
     xmlns="http://www.w3.org/2000/svg" version="1.1">

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#CC0000"/>
      <stop offset="50%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>

    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.35"/>
    </linearGradient>

    <clipPath id="hexClip">
      <polygon points="
        256,16
        464,144
        464,368
        256,496
        48,368
        48,144
      "/>
    </clipPath>
  </defs>

  

  <polygon
    points="256,16 464,144 464,368 256,496 48,368 48,144"
    fill="url(#bgGrad)"
    stroke="#ffffff"
    stroke-width="6"
  />

  <polygon
    points="256,32 448,144 448,368 256,480 64,368 64,144"
    fill="none"
    stroke="#000000"
    stroke-opacity="0.45"
    stroke-width="4"
  />

  <polygon
    points="256,16 464,144 464,368 256,496 48,368 48,144"
    fill="url(#innerGrad)"
    clip-path="url(#hexClip)"
  />

  <g opacity="0.18" clip-path="url(#hexClip)">
    
    
  </g>

  <text x="256" y="256"
        font-family="Arial Black, Arial, sans-serif"
        font-size="150"
        fill="#ffffff"
        text-anchor="middle"
        dominant-baseline="central"
        paint-order="stroke"
        stroke="#000000"
        stroke-width="10">
    TRE
  </text>

</svg>
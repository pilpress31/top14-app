<svg width="600" height="600" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <clipPath id="hexClip">
      <polygon points="100,10 175,50 175,150 100,190 25,150 25,50"/>
    </clipPath>

    <radialGradient id="redGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff1a1a" stop-opacity="0.9"/>
      <stop offset="70%" stop-color="#b30000" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2"
        flood-color="#000000" flood-opacity="0.8"/>
    </filter>
  </defs>

  <g clip-path="url(#hexClip)">
    <rect width="200" height="200" fill="#050505"/>
    <circle cx="100" cy="100" r="62" fill="url(#redGlow)"/>
  </g>

  <polygon
    points="100,10 175,50 175,150 100,190 25,150 25,50"
    fill="none"
    stroke="#d00000"
    stroke-width="8"
    stroke-linejoin="round"/>

  <polygon
    points="100,22 163.5,54 163.5,146 100,178 36.5,146 36.5,54"
    fill="none"
    stroke="#ffffff"
    stroke-width="3"
    stroke-linejoin="round"/>

  <text
    x="100"
    y="108"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="#ffffff"
    stroke="#111111"
    stroke-width="4"
    paint-order="stroke"
    font-family="Impact, Arial Black, sans-serif"
    font-size="58"
    font-weight="900"
    filter="url(#shadow)">ST</text>

</svg>
<svg
  width="200"
  height="200"
  viewBox="0 0 200 200"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <clipPath id="bulls-hex-clip">
      <polygon points="
        100,10
        175,50
        175,150
        100,190
        25,150
        25,50
      " />
    </clipPath>

    <!-- Zone intérieure pour éviter que les décors touchent les bordures -->
    <clipPath id="bulls-safe-clip">
      <polygon points="
        100,36
        150,64
        150,136
        100,164
        50,136
        50,64
      " />
    </clipPath>

    <linearGradient id="bulls-bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0057B8" />
      <stop offset="100%" stop-color="#002B5C" />
    </linearGradient>

    <linearGradient id="bulls-text-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#6EC6F2" />
    </linearGradient>
  </defs>

  <!-- Fond principal -->
  <g clip-path="url(#bulls-hex-clip)">
    <rect width="200" height="200" fill="url(#bulls-bg-grad)" />
  </g>

  <!-- Décor intérieur Bulls, sans toucher les bordures -->
  <g clip-path="url(#bulls-safe-clip)">
    <!-- Bande centrale bleu ciel -->
    <rect
      x="50"
      y="82"
      width="100"
      height="36"
      fill="#6EC6F2"
      opacity="0.88"
    />

    <!-- Bande bleu foncé centrale pour garder le texte lisible -->
    <rect
      x="56"
      y="91"
      width="88"
      height="18"
      fill="#002B5C"
      opacity="0.92"
    />

    <!-- Bandes blanches fines éloignées du texte -->
    <rect
      x="58"
      y="66"
      width="84"
      height="5"
      fill="#FFFFFF"
      opacity="0.8"
    />

    <rect
      x="58"
      y="129"
      width="84"
      height="5"
      fill="#FFFFFF"
      opacity="0.8"
    />

    <!-- Cornes stylisées abstraites, sans reprendre le logo officiel -->
    <path
      d="M62 82 C70 58, 88 52, 100 70"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="5"
      opacity="0.32"
      stroke-linecap="round"
    />

    <path
      d="M138 82 C130 58, 112 52, 100 70"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="5"
      opacity="0.32"
      stroke-linecap="round"
    />

    <path
      d="M62 118 C70 142, 88 148, 100 130"
      fill="none"
      stroke="#6EC6F2"
      stroke-width="5"
      opacity="0.35"
      stroke-linecap="round"
    />

    <path
      d="M138 118 C130 142, 112 148, 100 130"
      fill="none"
      stroke="#6EC6F2"
      stroke-width="5"
      opacity="0.35"
      stroke-linecap="round"
    />

    <!-- Chevrons dynamiques -->
    <path
      d="M66 78 L100 58 L134 78"
      fill="none"
      stroke="#6EC6F2"
      stroke-width="4"
      opacity="0.45"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <path
      d="M66 122 L100 142 L134 122"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="4"
      opacity="0.25"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </g>

  <!-- Bordure extérieure noire -->
  <polygon
    points="100,10 175,50 175,150 100,190 25,150 25,50"
    fill="none"
    stroke="#000000"
    stroke-width="8"
  />

  <!-- Bordure intérieure blanche -->
  <polygon
    points="100,22 163.5,54 163.5,146 100,178 36.5,146 36.5,54"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="4"
  />

  <!-- Fine bordure bleu ciel -->
  <polygon
    points="100,30 156,58 156,142 100,170 44,142 44,58"
    fill="none"
    stroke="#6EC6F2"
    stroke-width="2"
  />

  <!-- Texte BULLS avec contour noir -->
  <text
    x="50%"
    y="112"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="url(#bulls-text-grad)"
    stroke="#000000"
    stroke-width="6"
    paint-order="stroke"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="34"
    textLength="106"
    lengthAdjust="spacingAndGlyphs"
  >
    BULLS
  </text>

  <!-- Texte BULLS avec contour bleu ciel fin -->
  <text
    x="50%"
    y="112"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="url(#bulls-text-grad)"
    stroke="#6EC6F2"
    stroke-width="2"
    paint-order="stroke"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="34"
    textLength="106"
    lengthAdjust="spacingAndGlyphs"
  >
    BULLS
  </text>
</svg>
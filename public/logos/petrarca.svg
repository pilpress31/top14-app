<svg
  width="200"
  height="200"
  viewBox="0 0 200 200"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <clipPath id="petrarca-hex-clip">
      <polygon points="
        100,10
        175,50
        175,150
        100,190
        25,150
        25,50
      " />
    </clipPath>

    <!-- Zone intérieure pour éviter que les décors touchent les bordures -->
    <clipPath id="petrarca-safe-clip">
      <polygon points="
        100,36
        150,64
        150,136
        100,164
        50,136
        50,64
      " />
    </clipPath>

    <linearGradient id="petrarca-bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A2A2A" />
      <stop offset="100%" stop-color="#000000" />
    </linearGradient>

    <linearGradient id="petrarca-silver-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="55%" stop-color="#D8D8D8" />
      <stop offset="100%" stop-color="#8C8C8C" />
    </linearGradient>

    <linearGradient id="petrarca-text-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#CFCFCF" />
    </linearGradient>
  </defs>

  <!-- Fond principal -->
  <g clip-path="url(#petrarca-hex-clip)">
    <rect width="200" height="200" fill="url(#petrarca-bg-grad)" />
  </g>

  <!-- Décor intérieur Petrarca -->
  <g clip-path="url(#petrarca-safe-clip)">
    <!-- Bande centrale blanche/grise -->
    <rect
      x="50"
      y="82"
      width="100"
      height="36"
      fill="url(#petrarca-silver-grad)"
      opacity="0.9"
    />

    <!-- Bande noire centrale pour garder le texte lisible -->
    <rect
      x="52"
      y="90"
      width="96"
      height="20"
      fill="#000000"
      opacity="0.93"
    />

    <!-- Bandes blanches style rugby -->
    <rect
      x="58"
      y="64"
      width="84"
      height="7"
      fill="#FFFFFF"
      opacity="0.88"
    />

    <rect
      x="58"
      y="129"
      width="84"
      height="7"
      fill="#FFFFFF"
      opacity="0.88"
    />

    <!-- Accents noirs -->
    <rect
      x="58"
      y="74"
      width="84"
      height="4"
      fill="#000000"
      opacity="0.75"
    />

    <rect
      x="58"
      y="122"
      width="84"
      height="4"
      fill="#000000"
      opacity="0.75"
    />

    <!-- Livre ouvert stylisé, référence Petrarca -->
    <path
      d="M66 75
         C80 67, 92 67, 100 76
         C108 67, 120 67, 134 75
         L134 112
         C120 104, 108 104, 100 113
         C92 104, 80 104, 66 112Z"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="4"
      opacity="0.24"
      stroke-linejoin="round"
    />

    <!-- Trait central du livre -->
    <path
      d="M100 76 L100 113"
      stroke="#FFFFFF"
      stroke-width="3"
      opacity="0.22"
      stroke-linecap="round"
    />

    <!-- Plume abstraite -->
    <path
      d="M72 126
         C92 104, 113 91, 137 79
         C126 96, 111 112, 88 130"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="5"
      opacity="0.28"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <path
      d="M92 118 L105 120"
      stroke="#FFFFFF"
      stroke-width="3"
      opacity="0.22"
      stroke-linecap="round"
    />

    <!-- Ballon de rugby discret -->
    <path
      d="M64 121
         C82 105, 118 105, 136 121
         C116 136, 84 136, 64 121Z"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="4"
      opacity="0.18"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Traits dynamiques -->
    <path
      d="M58 136 L142 64"
      stroke="#FFFFFF"
      stroke-width="4"
      opacity="0.15"
      stroke-linecap="round"
    />

    <path
      d="M58 64 L142 136"
      stroke="#AFAFAF"
      stroke-width="4"
      opacity="0.22"
      stroke-linecap="round"
    />

    <!-- Accent italien discret -->
    <path
      d="M62 100 L138 100"
      stroke="#009246"
      stroke-width="3"
      opacity="0.18"
      stroke-linecap="round"
    />

    <path
      d="M62 105 L138 105"
      stroke="#CE2B37"
      stroke-width="3"
      opacity="0.16"
      stroke-linecap="round"
    />
  </g>

  <!-- Bordure extérieure noire -->
  <polygon
    points="100,10 175,50 175,150 100,190 25,150 25,50"
    fill="none"
    stroke="#000000"
    stroke-width="8"
  />

  <!-- Bordure intérieure blanche -->
  <polygon
    points="100,22 163.5,54 163.5,146 100,178 36.5,146 36.5,54"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="4"
  />

  <!-- Fine bordure grise -->
  <polygon
    points="100,30 156,58 156,142 100,170 44,142 44,58"
    fill="none"
    stroke="#BFBFBF"
    stroke-width="2"
    opacity="0.95"
  />

  <!-- Texte PET avec contour noir, sans débordement -->
  <text
    x="100"
    y="111"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="url(#petrarca-text-grad)"
    stroke="#000000"
    stroke-width="6"
    paint-order="stroke"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="42"
    textLength="86"
    lengthAdjust="spacingAndGlyphs"
  >
    PET
  </text>

  <!-- Contour gris fin -->
  <text
    x="100"
    y="111"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="url(#petrarca-text-grad)"
    stroke="#BFBFBF"
    stroke-width="1.8"
    paint-order="stroke"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="42"
    textLength="86"
    lengthAdjust="spacingAndGlyphs"
  >
    PET
  </text>
</svg>
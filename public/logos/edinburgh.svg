<svg
  width="200"
  height="200"
  viewBox="0 0 200 200"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <clipPath id="edinburgh-hex-clip">
      <polygon points="
        100,10
        175,50
        175,150
        100,190
        25,150
        25,50
      " />
    </clipPath>

    <!-- Zone intérieure pour éviter que les décors touchent les bordures -->
    <clipPath id="edinburgh-safe-clip">
      <polygon points="
        100,36
        150,64
        150,136
        100,164
        50,136
        50,64
      " />
    </clipPath>

    <linearGradient id="edinburgh-bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="100%" stop-color="#000000" />
    </linearGradient>

    <linearGradient id="edinburgh-text-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#F28C28" />
    </linearGradient>
  </defs>

  <!-- Fond principal -->
  <g clip-path="url(#edinburgh-hex-clip)">
    <rect width="200" height="200" fill="url(#edinburgh-bg-grad)" />
  </g>

  <!-- Décor intérieur Edinburgh, sans toucher les bordures -->
  <g clip-path="url(#edinburgh-safe-clip)">
    <!-- Bande centrale orange -->
    <rect
      x="50"
      y="82"
      width="100"
      height="36"
      fill="#F28C28"
      opacity="0.9"
    />

    <!-- Bande sombre centrale pour garder le texte lisible -->
    <rect
      x="56"
      y="91"
      width="88"
      height="18"
      fill="#050A12"
      opacity="0.92"
    />

    <!-- Bandes blanches fines éloignées du texte -->
    <rect
      x="58"
      y="66"
      width="84"
      height="5"
      fill="#FFFFFF"
      opacity="0.8"
    />

    <rect
      x="58"
      y="129"
      width="84"
      height="5"
      fill="#FFFFFF"
      opacity="0.8"
    />

    <!-- Silhouette abstraite de château / remparts, sans reprendre le logo officiel -->
    <path
      d="M66 77 L66 62 L78 62 L78 70 L92 70 L92 58 L108 58 L108 70 L122 70 L122 62 L134 62 L134 77"
      fill="none"
      stroke="#F28C28"
      stroke-width="5"
      opacity="0.5"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <path
      d="M66 123 L66 138 L78 138 L78 130 L92 130 L92 142 L108 142 L108 130 L122 130 L122 138 L134 138 L134 123"
      fill="none"
      stroke="#F28C28"
      stroke-width="5"
      opacity="0.35"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Traits diagonaux discrets -->
    <path
      d="M56 136 L144 64"
      stroke="#FFFFFF"
      stroke-width="4"
      opacity="0.12"
      stroke-linecap="round"
    />

    <path
      d="M56 64 L144 136"
      stroke="#F28C28"
      stroke-width="4"
      opacity="0.18"
      stroke-linecap="round"
    />
  </g>

  <!-- Bordure extérieure noire -->
  <polygon
    points="100,10 175,50 175,150 100,190 25,150 25,50"
    fill="none"
    stroke="#000000"
    stroke-width="8"
  />

  <!-- Bordure intérieure blanche -->
  <polygon
    points="100,22 163.5,54 163.5,146 100,178 36.5,146 36.5,54"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="4"
  />

  <!-- Fine bordure orange -->
  <polygon
    points="100,30 156,58 156,142 100,170 44,142 44,58"
    fill="none"
    stroke="#F28C28"
    stroke-width="2"
  />

  <!-- Texte EDI avec contour noir -->
  <text
    x="50%"
    y="112"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="url(#edinburgh-text-grad)"
    stroke="#000000"
    stroke-width="7"
    paint-order="stroke"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="50"
    textLength="106"
    lengthAdjust="spacingAndGlyphs"
  >
    EDI
  </text>

  <!-- Texte EDI avec contour orange fin -->
  <text
    x="50%"
    y="112"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="url(#edinburgh-text-grad)"
    stroke="#F28C28"
    stroke-width="2"
    paint-order="stroke"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="50"
    textLength="106"
    lengthAdjust="spacingAndGlyphs"
  >
    EDI
  </text>
</svg>
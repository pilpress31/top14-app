<svg
  width="200"
  height="200"
  viewBox="0 0 200 200"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <clipPath id="border-reivers-hex-clip">
      <polygon points="
        100,10
        175,50
        175,150
        100,190
        25,150
        25,50
      " />
    </clipPath>

    <!-- Zone intérieure pour éviter que les décors touchent les bordures -->
    <clipPath id="border-reivers-safe-clip">
      <polygon points="
        100,36
        150,64
        150,136
        100,164
        50,136
        50,64
      " />
    </clipPath>

    <linearGradient id="border-reivers-bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#151515" />
      <stop offset="100%" stop-color="#000000" />
    </linearGradient>

    <linearGradient id="border-reivers-gold-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F4D35E" />
      <stop offset="55%" stop-color="#C99A24" />
      <stop offset="100%" stop-color="#7A5610" />
    </linearGradient>

    <linearGradient id="border-reivers-text-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#F4D35E" />
    </linearGradient>
  </defs>

  <!-- Fond principal -->
  <g clip-path="url(#border-reivers-hex-clip)">
    <rect width="200" height="200" fill="url(#border-reivers-bg-grad)" />
  </g>

  <!-- Décor intérieur Border Reivers -->
  <g clip-path="url(#border-reivers-safe-clip)">
    <!-- Bande centrale or -->
    <rect
      x="50"
      y="82"
      width="100"
      height="36"
      fill="url(#border-reivers-gold-grad)"
      opacity="0.9"
    />

    <!-- Bande noire centrale pour garder le texte lisible -->
    <rect
      x="52"
      y="90"
      width="96"
      height="20"
      fill="#000000"
      opacity="0.93"
    />

    <!-- Bandes blanches/or style rugby -->
    <rect
      x="58"
      y="64"
      width="84"
      height="7"
      fill="#FFFFFF"
      opacity="0.82"
    />

    <rect
      x="58"
      y="129"
      width="84"
      height="7"
      fill="#FFFFFF"
      opacity="0.82"
    />

    <rect
      x="58"
      y="74"
      width="84"
      height="4"
      fill="#F4D35E"
      opacity="0.85"
    />

    <rect
      x="58"
      y="122"
      width="84"
      height="4"
      fill="#F4D35E"
      opacity="0.85"
    />

    <!-- Collines / frontières stylisées -->
    <path
      d="M58 82
         C72 70, 84 70, 98 82
         C113 95, 128 91, 144 76"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="5"
      opacity="0.2"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <path
      d="M58 126
         C75 112, 88 113, 102 126
         C116 139, 130 137, 144 122"
      fill="none"
      stroke="#F4D35E"
      stroke-width="5"
      opacity="0.34"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Motif cavalier / reiver abstrait -->
    <path
      d="M67 116
         C82 99, 99 101, 112 87
         C120 79, 132 77, 141 82
         C131 87, 126 94, 128 103
         C116 100, 108 106, 99 118
         C88 130, 76 130, 67 116Z"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="4"
      opacity="0.24"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Ballon de rugby discret -->
    <path
      d="M64 121
         C82 105, 118 105, 136 121
         C116 136, 84 136, 64 121Z"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="4"
      opacity="0.18"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Traits dynamiques -->
    <path
      d="M58 136 L142 64"
      stroke="#F4D35E"
      stroke-width="4"
      opacity="0.23"
      stroke-linecap="round"
    />

    <path
      d="M58 64 L142 136"
      stroke="#FFFFFF"
      stroke-width="4"
      opacity="0.12"
      stroke-linecap="round"
    />

    <!-- Accent bleu écossais discret -->
    <path
      d="M62 100 L138 100"
      stroke="#005EB8"
      stroke-width="3"
      opacity="0.18"
      stroke-linecap="round"
    />
  </g>

  <!-- Bordure extérieure noire -->
  <polygon
    points="100,10 175,50 175,150 100,190 25,150 25,50"
    fill="none"
    stroke="#000000"
    stroke-width="8"
  />

  <!-- Bordure intérieure blanche -->
  <polygon
    points="100,22 163.5,54 163.5,146 100,178 36.5,146 36.5,54"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="4"
  />

  <!-- Fine bordure or -->
  <polygon
    points="100,30 156,58 156,142 100,170 44,142 44,58"
    fill="none"
    stroke="#F4D35E"
    stroke-width="2"
    opacity="0.95"
  />

  <!-- Texte BOR avec contour noir, sans débordement -->
  <text
    x="100"
    y="111"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="url(#border-reivers-text-grad)"
    stroke="#000000"
    stroke-width="6"
    paint-order="stroke"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="41"
    textLength="88"
    lengthAdjust="spacingAndGlyphs"
  >
    BOR
  </text>

  <!-- Contour or fin -->
  <text
    x="100"
    y="111"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="url(#border-reivers-text-grad)"
    stroke="#F4D35E"
    stroke-width="1.8"
    paint-order="stroke"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="41"
    textLength="88"
    lengthAdjust="spacingAndGlyphs"
  >
    BOR
  </text>
</svg>
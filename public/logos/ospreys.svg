<svg
  width="200"
  height="200"
  viewBox="0 0 200 200"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <clipPath id="ospreys-hex-clip">
      <polygon points="
        100,10
        175,50
        175,150
        100,190
        25,150
        25,50
      " />
    </clipPath>

    <!-- Zone intérieure pour éviter que les décors touchent les bordures -->
    <clipPath id="ospreys-safe-clip">
      <polygon points="
        100,36
        150,64
        150,136
        100,164
        50,136
        50,64
      " />
    </clipPath>

    <linearGradient id="ospreys-bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1A1A" />
      <stop offset="100%" stop-color="#000000" />
    </linearGradient>

    <linearGradient id="ospreys-text-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#A7A9AC" />
    </linearGradient>
  </defs>

  <!-- Fond principal -->
  <g clip-path="url(#ospreys-hex-clip)">
    <rect width="200" height="200" fill="url(#ospreys-bg-grad)" />
  </g>

  <!-- Décor intérieur Ospreys, sans toucher les bordures -->
  <g clip-path="url(#ospreys-safe-clip)">
    <!-- Bande centrale argentée -->
    <rect
      x="50"
      y="82"
      width="100"
      height="36"
      fill="#A7A9AC"
      opacity="0.78"
    />

    <!-- Bande noire centrale pour garder le texte lisible -->
    <rect
      x="56"
      y="91"
      width="88"
      height="18"
      fill="#000000"
      opacity="0.92"
    />

    <!-- Bandes blanches fines éloignées du texte -->
    <rect
      x="58"
      y="66"
      width="84"
      height="5"
      fill="#FFFFFF"
      opacity="0.75"
    />

    <rect
      x="58"
      y="129"
      width="84"
      height="5"
      fill="#FFFFFF"
      opacity="0.75"
    />

    <!-- Ailes stylisées abstraites, sans reprendre le logo officiel -->
    <path
      d="M58 80 C76 58, 94 58, 100 76 C84 72, 72 76, 58 90"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="5"
      opacity="0.26"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <path
      d="M142 80 C124 58, 106 58, 100 76 C116 72, 128 76, 142 90"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="5"
      opacity="0.26"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <path
      d="M58 120 C76 142, 94 142, 100 124 C84 128, 72 124, 58 110"
      fill="none"
      stroke="#A7A9AC"
      stroke-width="5"
      opacity="0.32"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <path
      d="M142 120 C124 142, 106 142, 100 124 C116 128, 128 124, 142 110"
      fill="none"
      stroke="#A7A9AC"
      stroke-width="5"
      opacity="0.32"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Chevrons argentés discrets -->
    <path
      d="M66 78 L100 58 L134 78"
      fill="none"
      stroke="#A7A9AC"
      stroke-width="4"
      opacity="0.45"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <path
      d="M66 122 L100 142 L134 122"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="4"
      opacity="0.22"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </g>

  <!-- Bordure extérieure noire -->
  <polygon
    points="100,10 175,50 175,150 100,190 25,150 25,50"
    fill="none"
    stroke="#000000"
    stroke-width="8"
  />

  <!-- Bordure intérieure blanche -->
  <polygon
    points="100,22 163.5,54 163.5,146 100,178 36.5,146 36.5,54"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="4"
  />

  <!-- Fine bordure argentée -->
  <polygon
    points="100,30 156,58 156,142 100,170 44,142 44,58"
    fill="none"
    stroke="#A7A9AC"
    stroke-width="2"
  />

  <!-- Texte OSP avec contour noir -->
  <text
    x="50%"
    y="112"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="url(#ospreys-text-grad)"
    stroke="#000000"
    stroke-width="7"
    paint-order="stroke"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="50"
    textLength="106"
    lengthAdjust="spacingAndGlyphs"
  >
    OSP
  </text>

  <!-- Texte OSP avec contour argenté fin -->
  <text
    x="50%"
    y="112"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="url(#ospreys-text-grad)"
    stroke="#A7A9AC"
    stroke-width="2"
    paint-order="stroke"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="50"
    textLength="106"
    lengthAdjust="spacingAndGlyphs"
  >
    OSP
  </text>
</svg>